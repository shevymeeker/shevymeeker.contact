<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0b09">
  <link rel="manifest" href="/manifest-stopwatch.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Stopwatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Instrument+Serif:ital@1&family=Space+Mono:wght@400;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Instrument+Serif:ital@1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0d0b09;
      --s1:    #1e1b15;
      --s2:    #2b2520;
      --s3:    #37302a;
      --b:     #4a4038;
      --a:     #c8a05c;
      --a2:    #5f9ea8;
      --t:     #ede9e2;
      --m:     #a09890;
      --mono:  'Space Mono', 'Courier New', monospace;
      --serif: 'Instrument Serif', Georgia, serif;
      --sans:  'DM Sans', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--t);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ── Topbar ────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--b);
      flex-shrink: 0;
      background: rgba(13,11,9,.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .home-btn {
      background: transparent;
      border: 1px solid var(--b);
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 10px;
      font-family: var(--mono);
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--m);
      text-decoration: none;
      transition: border-color .2s, color .2s;
    }
    .home-btn:hover { border-color: var(--a); color: var(--a); }

    .page-title {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.05rem;
      color: var(--t);
    }

    .spacer { width: 60px; }

    /* ── Main layout ────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px 32px;
    }

    /* ── Clock face section ─────────────────────────────── */
    .clock-face {
      width: 100%;
      max-width: 420px;
      padding: 48px 0 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
    }

    /* Subtle radial glow behind time */
    .clock-face::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 320px;
      height: 160px;
      background: radial-gradient(ellipse, rgba(200,160,92,.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .time-display {
      font-family: var(--mono);
      font-size: clamp(3.2rem, 14vw, 5.5rem);
      font-weight: 400;
      color: var(--t);
      letter-spacing: -.04em;
      line-height: 1;
      position: relative;
      z-index: 1;
      transition: color .2s;
    }

    .time-display.running {
      color: var(--t);
    }

    .time-cs {
      font-family: var(--mono);
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: 400;
      color: var(--a);
      letter-spacing: -.02em;
      opacity: .9;
      position: relative;
      z-index: 1;
    }

    .status-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--m);
      opacity: .6;
      margin-top: 4px;
      min-height: 14px;
    }

    /* ── Controls ────────────────────────────────────────── */
    .controls {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 28px;
    }

    .ctrl-btn {
      flex: 1;
      height: 52px;
      border: 1px solid var(--b);
      border-radius: 8px;
      background: var(--s1);
      color: var(--m);
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .15s, border-color .2s, color .2s, transform .1s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .ctrl-btn:hover  { background: var(--s2); }
    .ctrl-btn:active { transform: scale(.96); }

    .ctrl-btn.primary {
      background: var(--a);
      border-color: var(--a);
      color: var(--bg);
      font-weight: 700;
    }
    .ctrl-btn.primary:hover  { background: #d4a862; border-color: #d4a862; }
    .ctrl-btn.primary:active { background: #b8924e; }

    .ctrl-btn.running {
      background: var(--s2);
      border-color: rgba(200,160,92,.3);
      color: var(--a);
    }
    .ctrl-btn.running:hover { background: var(--s3); }

    .ctrl-btn.teal {
      border-color: rgba(95,158,168,.3);
      color: var(--a2);
    }
    .ctrl-btn.teal:hover { background: rgba(95,158,168,.07); border-color: var(--a2); }

    /* ── Lap list ────────────────────────────────────────── */
    .lap-section {
      width: 100%;
      max-width: 420px;
    }

    .lap-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 10px;
      margin-bottom: 2px;
      border-bottom: 1px solid var(--b);
    }

    .lap-header-label {
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--m);
      font-family: var(--mono);
      opacity: .7;
    }

    .lap-count {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--m);
      opacity: .5;
    }

    .lap-list {
      list-style: none;
      max-height: 280px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--b) transparent;
    }
    .lap-list::-webkit-scrollbar { width: 3px; }
    .lap-list::-webkit-scrollbar-track { background: transparent; }
    .lap-list::-webkit-scrollbar-thumb { background: var(--b); border-radius: 2px; }

    .lap-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid rgba(74,64,56,.6);
      animation: lapIn .2s ease;
    }
    .lap-item:last-child { border-bottom: none; }

    @keyframes lapIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .lap-num {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--m);
      letter-spacing: .1em;
      opacity: .6;
      min-width: 52px;
    }

    .lap-time {
      font-family: var(--mono);
      font-size: 1.05rem;
      color: var(--t);
      letter-spacing: -.01em;
    }

    .lap-item.fastest .lap-time { color: var(--a2); }
    .lap-item.slowest .lap-time { color: rgba(200,100,80,.85); }

    .lap-badge {
      font-size: 9px;
      font-family: var(--mono);
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 3px;
      min-width: 54px;
      text-align: right;
    }
    .lap-badge.fast { color: var(--a2); }
    .lap-badge.slow { color: rgba(200,100,80,.85); }

    .empty-laps {
      padding: 28px 0;
      text-align: center;
      font-size: 13px;
      color: var(--m);
      opacity: .45;
      font-family: var(--mono);
      letter-spacing: .05em;
    }

    /* ── Session restore banner ─────────────────────────── */
    .session-banner {
      background: var(--s2);
      border-bottom: 1px solid var(--b);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--m);
      flex-shrink: 0;
    }
    .session-actions { display: flex; gap: 8px; }

    /* ── Target time ─────────────────────────────────────── */
    .sw-extras {
      width: 100%;
      max-width: 420px;
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .target-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .target-input {
      background: var(--s1);
      border: 1px solid var(--b);
      border-radius: 6px;
      color: var(--t);
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 7px 12px;
      width: 90px;
      outline: none;
      text-align: center;
      transition: border-color .2s;
    }
    .target-input:focus { border-color: var(--a); }
    .time-display.target-passed { color: var(--a); }

    /* Keyboard hint (pointer-device only) */
    @media (pointer: fine) {
      .kb-hint {
        font-family: var(--mono);
        font-size: 9px;
        letter-spacing: .1em;
        color: var(--m);
        opacity: .35;
        text-align: center;
        text-transform: uppercase;
        margin-top: 12px;
      }
    }
    @media (pointer: coarse) { .kb-hint { display: none; } }

    /* ── Popup mode ──────────────────────────────────────── */
    body.popup-mode {
      padding: 0;
    }
    body.popup-mode .topbar { display: none; }
    body.popup-mode main { padding: 12px 16px 16px; }
    body.popup-mode .clock-face { padding: 16px 0 12px; }
    body.popup-mode .time-display { font-size: clamp(2rem, 12vw, 3.5rem); }
    body.popup-mode .time-cs { font-size: clamp(1rem, 4vw, 1.6rem); }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="home-btn" href="index.html">← Home</a>
    <span class="page-title">Stopwatch</span>
    <button id="pwa-install-btn" class="home-btn" style="display:none;border-color:rgba(200,160,92,.4);color:var(--a);">↓ Install</button>
  </div>

  <div class="session-banner" id="session-banner" style="display:none">
    <span id="session-msg">Restore previous session?</span>
    <div class="session-actions">
      <button class="ctrl-btn" id="btn-restore" style="flex:none;padding:0 14px;height:34px;font-size:9px;">Restore</button>
      <button class="ctrl-btn" id="btn-discard" style="flex:none;padding:0 14px;height:34px;font-size:9px;">Discard</button>
    </div>
  </div>

  <main>
    <div class="clock-face">
      <div class="time-display" id="time-display">00:00</div>
      <div class="time-cs" id="time-cs">.00</div>
      <div class="status-label" id="status-label"></div>
    </div>

    <div class="controls">
      <button class="ctrl-btn primary" id="btn-start">Start</button>
      <button class="ctrl-btn" id="btn-lap" disabled>Lap</button>
      <button class="ctrl-btn" id="btn-reset">Reset</button>
    </div>

    <div class="lap-section" id="lap-section" style="display:none">
      <div class="lap-header">
        <span class="lap-header-label">Laps</span>
        <span class="lap-count" id="lap-count"></span>
      </div>
      <ul class="lap-list" id="lap-list"></ul>
    </div>

    <div class="empty-laps" id="empty-laps" style="display:none">
      — no laps recorded —
    </div>

    <div class="sw-extras">
      <div class="target-row">
        <span class="lap-header-label">Target (MM:SS)</span>
        <input id="target-input" class="target-input" type="text" placeholder="e.g. 01:30" maxlength="5" inputmode="numeric">
      </div>
      <button id="btn-export" class="ctrl-btn" style="display:none;">⎘ Copy Laps</button>
    </div>

    <div class="kb-hint">Space start/stop · L lap · R reset</div>
  </main>

  <script>
    // Popup mode
    if (new URLSearchParams(location.search).get('popup') === '1') {
      document.body.classList.add('popup-mode');
    }

    const displayEl = document.getElementById('time-display');
    const csEl      = document.getElementById('time-cs');
    const statusEl  = document.getElementById('status-label');
    const btnStart  = document.getElementById('btn-start');
    const btnLap    = document.getElementById('btn-lap');
    const btnReset  = document.getElementById('btn-reset');
    const lapSection = document.getElementById('lap-section');
    const lapList   = document.getElementById('lap-list');
    const lapCount  = document.getElementById('lap-count');
    const emptyLaps = document.getElementById('empty-laps');

    let interval   = null;
    let elapsed    = 0;   // centiseconds
    let lapStart   = 0;
    let running    = false;
    let laps       = [];

    function pad2(n) { return String(n).padStart(2, '0'); }

    function fmtTime(cs) {
      const totalSec = Math.floor(cs / 100);
      const m = Math.floor(totalSec / 60);
      const s = totalSec % 60;
      const c = cs % 100;
      return { main: `${pad2(m)}:${pad2(s)}`, cs: `.${pad2(c)}` };
    }

    function render() {
      const { main, cs } = fmtTime(elapsed);
      displayEl.textContent = main;
      csEl.textContent      = cs;
    }

    function renderLaps() {
      if (laps.length === 0) {
        lapSection.style.display = 'none';
        emptyLaps.style.display = 'none';
        return;
      }

      lapSection.style.display = 'block';
      emptyLaps.style.display = 'none';
      lapCount.textContent = `${laps.length} lap${laps.length !== 1 ? 's' : ''}`;

      const times = laps.map(l => l.split);
      const min = Math.min(...times);
      const max = Math.max(...times);

      lapList.innerHTML = '';
      // Show newest first
      [...laps].reverse().forEach((lap, revIdx) => {
        const idx = laps.length - 1 - revIdx;
        const li = document.createElement('li');
        li.className = 'lap-item';
        if (laps.length > 1 && lap.split === min) li.classList.add('fastest');
        if (laps.length > 1 && lap.split === max) li.classList.add('slowest');

        const { main: lMain, cs: lCs } = fmtTime(lap.total);
        const { main: sMain, cs: sCs } = fmtTime(lap.split);

        let badge = '';
        if (laps.length > 1 && lap.split === min) badge = '<span class="lap-badge fast">fastest</span>';
        else if (laps.length > 1 && lap.split === max) badge = '<span class="lap-badge slow">slowest</span>';
        else badge = '<span class="lap-badge"></span>';

        li.innerHTML = `
          <span class="lap-num">LAP ${pad2(idx + 1)}</span>
          <span class="lap-time">${sMain}${sCs}</span>
          ${badge}
        `;
        lapList.appendChild(li);
      });
    }

    function tick() {
      elapsed++;
      render();
    }

    btnStart.addEventListener('click', () => {
      if (!running) {
        // Start
        running = true;
        lapStart = elapsed;
        interval = setInterval(tick, 10);
        btnStart.textContent = 'Stop';
        btnStart.classList.remove('primary');
        btnStart.classList.add('running');
        btnLap.disabled = false;
        btnLap.classList.add('teal');
        statusEl.textContent = 'running';
        displayEl.classList.add('running');
      } else {
        // Stop
        running = false;
        clearInterval(interval);
        interval = null;
        btnStart.textContent = 'Resume';
        btnStart.classList.remove('running');
        btnStart.classList.add('primary');
        btnLap.disabled = true;
        btnLap.classList.remove('teal');
        statusEl.textContent = 'paused';
      }
    });

    btnLap.addEventListener('click', () => {
      if (!running) return;
      const split = elapsed - lapStart;
      laps.push({ total: elapsed, split });
      lapStart = elapsed;
      renderLaps();
      document.getElementById('btn-export').style.display = '';
      saveSwState();
    });

    btnReset.addEventListener('click', () => {
      running = false;
      clearInterval(interval);
      interval = null;
      elapsed  = 0;
      lapStart = 0;
      laps     = [];
      btnStart.textContent = 'Start';
      btnStart.classList.add('primary');
      btnStart.classList.remove('running');
      btnLap.disabled = true;
      btnLap.classList.remove('teal');
      statusEl.textContent = '';
      displayEl.classList.remove('running');
      displayEl.classList.remove('target-passed');
      document.getElementById('btn-export').style.display = 'none';
      localStorage.removeItem('stopwatchState');
      render();
      renderLaps();
    });

    // ── Session persistence ────────────────────────────────
    const SW_KEY = 'stopwatchState';

    function saveSwState() {
      if (elapsed === 0) { localStorage.removeItem(SW_KEY); return; }
      localStorage.setItem(SW_KEY, JSON.stringify({ elapsed, lapStart, laps }));
    }

    // Save on visibility change (iOS doesn't fire beforeunload reliably)
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && elapsed > 0) saveSwState();
    });
    window.addEventListener('beforeunload', () => { if (elapsed > 0) saveSwState(); });
    // Save every 5s while running
    setInterval(() => { if (running && elapsed > 0) saveSwState(); }, 5000);

    // Check for saved state on load
    (function() {
      try {
        const saved = JSON.parse(localStorage.getItem(SW_KEY));
        if (!saved || saved.elapsed <= 0) return;
        const { main, cs } = fmtTime(saved.elapsed);
        document.getElementById('session-msg').textContent =
          `Restore session? (${main}${cs} elapsed, ${(saved.laps || []).length} laps)`;
        document.getElementById('session-banner').style.display = 'flex';

        document.getElementById('btn-restore').addEventListener('click', () => {
          elapsed  = saved.elapsed;
          lapStart = saved.lapStart;
          laps     = saved.laps || [];
          render();
          renderLaps();
          if (laps.length) document.getElementById('btn-export').style.display = '';
          btnStart.textContent = 'Resume';
          btnStart.classList.add('primary');
          statusEl.textContent = 'paused';
          document.getElementById('session-banner').style.display = 'none';
        });
        document.getElementById('btn-discard').addEventListener('click', () => {
          localStorage.removeItem(SW_KEY);
          document.getElementById('session-banner').style.display = 'none';
        });
      } catch(e) {}
    })();

    // ── Keyboard shortcuts ─────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === ' ' || e.code === 'Space') {
        e.preventDefault();
        btnStart.click();
      } else if ((e.key === 'l' || e.key === 'L') && running) {
        btnLap.click();
      } else if ((e.key === 'r' || e.key === 'R') && !running) {
        btnReset.click();
      }
    });

    // ── Export laps ────────────────────────────────────────
    document.getElementById('btn-export').addEventListener('click', () => {
      if (!laps.length) return;
      const lines = laps.map((lap, i) => {
        const { main: sm, cs: sc } = fmtTime(lap.split);
        const { main: tm, cs: tc } = fmtTime(lap.total);
        return `LAP ${pad2(i+1)}  Split: ${sm}${sc}  Total: ${tm}${tc}`;
      });
      navigator.clipboard.writeText(lines.join('\n')).then(() => {
        const btn = document.getElementById('btn-export');
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 1500);
      });
    });

    // ── Target time ────────────────────────────────────────
    let targetCs = 0;
    document.getElementById('target-input').addEventListener('input', e => {
      const m = e.target.value.match(/^(\d{1,2}):(\d{2})$/);
      targetCs = m ? (parseInt(m[1]) * 60 + parseInt(m[2])) * 100 : 0;
    });

    // Redefine tick to also check target (overrides earlier declaration)
    function tick() {
      elapsed++;
      render();
      if (targetCs > 0) {
        if (elapsed >= targetCs) displayEl.classList.add('target-passed');
        else displayEl.classList.remove('target-passed');
      }
    }

    render();
  </script>
<script>
  // ── PWA Install Prompt ────────────────────────────────────────
  (function() {
    var DISMISS_KEY = 'pwaInstallDismissed';
    if (localStorage.getItem(DISMISS_KEY)) return;
    var deferredPrompt = null;
    var btn = document.getElementById('pwa-install-btn');
    if (!btn) return;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      btn.style.display = '';
    });
    btn.addEventListener('click', function() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(r) {
        deferredPrompt = null;
        btn.style.display = 'none';
        if (r.outcome === 'dismissed') localStorage.setItem(DISMISS_KEY, '1');
      });
    });
    window.addEventListener('appinstalled', function() {
      btn.style.display = 'none';
      deferredPrompt = null;
    });
  })();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function(){});
</script>
</body>
</html>
