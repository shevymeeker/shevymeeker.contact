<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="description" content="Calculator Using Javascript">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <title>Calculator</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.82);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
    }

    /* ── Card ──────────────────────────────────── */
    .calc-card {
      background: #1a1f2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      width: 100%;
      max-width: 340px;
      box-shadow:
        0 4px 6px rgba(0,0,0,0.3),
        0 20px 60px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.06);
      overflow: hidden;
    }

    /* ── Top bar ───────────────────────────────── */
    .calc-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .home-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      transition: background 0.15s;
    }
    .home-btn:hover { background: rgba(255,255,255,0.14); }

    .calc-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.04em;
    }

    .spacer { width: 60px; }

    /* ── Display ───────────────────────────────── */
    .calc-display {
      padding: 12px 20px 16px;
      text-align: right;
      min-height: 84px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    #expr {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.38);
      min-height: 18px;
      word-break: break-all;
      margin-bottom: 4px;
    }

    #result {
      font-size: 2.6rem;
      font-weight: 200;
      color: #fff;
      word-break: break-all;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    /* ── Button grid ───────────────────────────── */
    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: rgba(255,255,255,0.06);
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .btn {
      border: none;
      background: #1e2537;
      color: #fff;
      font-size: 1.25rem;
      font-family: inherit;
      font-weight: 400;
      padding: 0;
      height: 72px;
      cursor: pointer;
      transition: background 0.1s, transform 0.08s;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* Slightly larger on wide screens */
    @media (min-width: 400px) {
      .btn { height: 76px; font-size: 1.3rem; }
    }

    .btn:active {
      background: #2a3347;
      transform: scale(0.94);
    }

    /* Function buttons (AC, +/−, %) */
    .btn.fn {
      background: #2c3347;
      color: rgba(255,255,255,0.75);
      font-size: 1rem;
    }
    .btn.fn:active { background: #374057; }

    /* Operator buttons */
    .btn.op {
      background: #1e2e4a;
      color: #58a6ff;
      font-size: 1.3rem;
      font-weight: 600;
    }
    .btn.op:active { background: #243756; }

    /* Equals */
    .btn.eq {
      background: #FF453A;
      color: #fff;
      font-weight: 700;
    }
    .btn.eq:active { background: #e03028; }

    /* Zero spans 2 cols */
    .btn.zero {
      grid-column: span 2;
      justify-content: flex-start;
      padding-left: 28px;
      font-size: 1.25rem;
    }

    /* Bottom-row rounding */
    .calc-grid .btn:last-child { border-radius: 0 0 28px 0; }
    .calc-grid .btn.zero { border-radius: 0 0 0 28px; }
  </style>
</head>
<body>
  <div class="calc-card">
    <div class="calc-topbar">
      <a class="home-btn" href="index.html">← Home</a>
      <span class="calc-label">Calculator</span>
      <div class="spacer"></div>
    </div>

    <div class="calc-display">
      <div id="expr"></div>
      <div id="result">0</div>
    </div>

    <div class="calc-grid">
      <button class="btn fn" data-action="clear">AC</button>
      <button class="btn fn" data-action="sign">+/−</button>
      <button class="btn fn" data-action="pct">%</button>
      <button class="btn op" data-action="op" data-val="/">÷</button>

      <button class="btn" data-action="num" data-val="7">7</button>
      <button class="btn" data-action="num" data-val="8">8</button>
      <button class="btn" data-action="num" data-val="9">9</button>
      <button class="btn op" data-action="op" data-val="×">×</button>

      <button class="btn" data-action="num" data-val="4">4</button>
      <button class="btn" data-action="num" data-val="5">5</button>
      <button class="btn" data-action="num" data-val="6">6</button>
      <button class="btn op" data-action="op" data-val="−">−</button>

      <button class="btn" data-action="num" data-val="1">1</button>
      <button class="btn" data-action="num" data-val="2">2</button>
      <button class="btn" data-action="num" data-val="3">3</button>
      <button class="btn op" data-action="op" data-val="+">+</button>

      <button class="btn zero" data-action="num" data-val="0">0</button>
      <button class="btn" data-action="dot">.</button>
      <button class="btn eq" data-action="eq">=</button>
    </div>
  </div>

  <script>
    const exprEl   = document.getElementById('expr');
    const resultEl = document.getElementById('result');

    let state = {
      value: '0',
      expr: '',
      op: null,
      prev: null,
      newInput: false
    };

    function fmt(n) {
      const num = parseFloat(n);
      if (isNaN(num)) return n;
      const s = parseFloat(num.toPrecision(10)).toString();
      return s.length > 13 ? num.toExponential(4) : s;
    }

    function render() {
      exprEl.textContent  = state.expr;
      resultEl.textContent = fmt(state.value);
    }

    function num(v) {
      if (state.newInput) { state.value = v; state.newInput = false; }
      else state.value = state.value === '0' ? v : state.value + v;
      render();
    }

    function dot() {
      if (state.newInput) { state.value = '0.'; state.newInput = false; }
      else if (!state.value.includes('.')) state.value += '.';
      render();
    }

    function op(o) {
      if (state.op && !state.newInput) compute(false);
      state.prev = state.value;
      state.op   = o;
      state.expr = `${fmt(state.value)} ${o}`;
      state.newInput = true;
      render();
    }

    function compute(showExpr = true) {
      if (!state.op || state.prev === null) return;
      const a = parseFloat(state.prev), b = parseFloat(state.value);
      let r;
      switch (state.op) {
        case '+': r = a + b; break;
        case '−': r = a - b; break;
        case '×': r = a * b; break;
        case '/': r = b !== 0 ? a / b : 'Error'; break;
        default: r = b;
      }
      if (showExpr) state.expr = `${fmt(state.prev)} ${state.op} ${fmt(state.value)} =`;
      state.value = r === 'Error' ? 'Error' : String(r);
      state.op = null;
      state.prev = null;
      state.newInput = true;
      render();
    }

    document.querySelector('.calc-grid').addEventListener('click', e => {
      const btn = e.target.closest('.btn');
      if (!btn) return;
      const action = btn.dataset.action;

      if (action === 'num')   num(btn.dataset.val);
      if (action === 'dot')   dot();
      if (action === 'op')    op(btn.dataset.val);
      if (action === 'eq')    compute(true);
      if (action === 'clear') {
        state = { value: '0', expr: '', op: null, prev: null, newInput: false };
        render();
      }
      if (action === 'sign') {
        state.value = String(parseFloat(state.value) * -1);
        render();
      }
      if (action === 'pct') {
        state.value = String(parseFloat(state.value) / 100);
        render();
      }
    });

    // Keyboard support
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') num(e.key);
      else if (e.key === '.') dot();
      else if (e.key === 'Enter' || e.key === '=') compute(true);
      else if (e.key === 'Escape') {
        state = { value: '0', expr: '', op: null, prev: null, newInput: false };
        render();
      }
      else if (e.key === '+') op('+');
      else if (e.key === '-') op('−');
      else if (e.key === '*') op('×');
      else if (e.key === '/') { e.preventDefault(); op('/'); }
      else if (e.key === 'Backspace') {
        if (state.value.length > 1 && state.value !== 'Error') {
          state.value = state.value.slice(0, -1);
        } else {
          state.value = '0';
        }
        render();
      }
    });

    render();
  </script>
</body>
</html>
