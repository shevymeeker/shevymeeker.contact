<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="description" content="Calculator">
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0b09">
  <link rel="manifest" href="/manifest-calculator.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Instrument+Serif:ital@1&family=Space+Mono:wght@400;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Instrument+Serif:ital@1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0d0b09;
      --s1:    #141210;
      --s2:    #1c1916;
      --s3:    #231f1b;
      --b:     #2d2922;
      --a:     #c8a05c;
      --a2:    #5f9ea8;
      --t:     #ede9e2;
      --m:     #9a9390;
      --mono:  'Space Mono', 'Courier New', monospace;
      --serif: 'Instrument Serif', Georgia, serif;
      --sans:  'DM Sans', system-ui, sans-serif;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
    }

    /* ── Card ──────────────────────────────────────────────── */
    .calc-card {
      background: var(--s1);
      border: 1px solid var(--b);
      border-radius: 20px;
      width: 100%;
      max-width: 340px;
      box-shadow:
        0 4px 6px rgba(0,0,0,.5),
        0 24px 64px rgba(0,0,0,.7),
        inset 0 1px 0 rgba(255,255,255,.04);
      overflow: hidden;
      position: relative;
    }

    /* Amber accent shimmer at top */
    .calc-card::before {
      content: '';
      position: absolute;
      top: 0; left: 8%; right: 8%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,160,92,.55), transparent);
      pointer-events: none;
    }

    /* ── Topbar ─────────────────────────────────────────────── */
    .calc-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--b);
    }

    .home-btn {
      background: transparent;
      border: 1px solid var(--b);
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 10px;
      font-family: var(--mono);
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--m);
      text-decoration: none;
      transition: border-color .2s, color .2s;
      white-space: nowrap;
    }
    .home-btn:hover { border-color: var(--a); color: var(--a); }

    .calc-label {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.05rem;
      color: var(--t);
      letter-spacing: .01em;
    }

    .topbar-right { display: flex; gap: 6px; align-items: center; }

    /* ── Display ─────────────────────────────────────────────── */
    .calc-display {
      padding: 14px 22px 20px;
      text-align: right;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      position: relative;
    }

    .copy-feedback {
      position: absolute;
      top: 10px; right: 10px;
      background: var(--a);
      color: var(--bg);
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
    }
    .copy-feedback.show { opacity: 1; }

    /* ── History Drawer ──────────────────────────────────────── */
    .history-drawer {
      background: var(--s1);
      border-top: 1px solid var(--b);
      display: none;
    }
    .history-drawer.open { display: block; }
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--b);
    }
    .history-title {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--m);
    }
    .history-clear {
      background: none;
      border: none;
      color: var(--m);
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 2px 6px;
      transition: color .2s;
    }
    .history-clear:hover { color: var(--a); }
    .history-list {
      list-style: none;
      max-height: 220px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--b) transparent;
    }
    .history-item {
      padding: 10px 16px;
      border-bottom: 1px solid rgba(45,41,34,.5);
      cursor: pointer;
      transition: background .1s;
      text-align: right;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { background: var(--s2); }
    .history-expr {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--m);
      letter-spacing: .02em;
    }
    .history-result {
      font-family: var(--mono);
      font-size: 1.25rem;
      color: var(--t);
      letter-spacing: -.02em;
      margin-top: 2px;
    }
    .history-empty {
      padding: 20px 16px;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--m);
      opacity: .4;
    }

    #expr {
      font-size: 0.72rem;
      font-family: var(--mono);
      color: var(--m);
      min-height: 18px;
      word-break: break-all;
      margin-bottom: 6px;
      letter-spacing: .02em;
    }

    #result {
      font-size: 2.8rem;
      font-family: var(--mono);
      font-weight: 400;
      color: var(--t);
      word-break: break-all;
      line-height: 1;
      letter-spacing: -.03em;
      transition: color .15s;
    }

    #result.flash {
      color: var(--a);
    }

    /* ── Button grid ─────────────────────────────────────────── */
    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--b);
      border-top: 1px solid var(--b);
    }

    .btn {
      border: none;
      background: var(--s1);
      color: var(--t);
      font-size: 1.15rem;
      font-family: var(--mono);
      font-weight: 400;
      padding: 0;
      height: 70px;
      cursor: pointer;
      transition: background .1s, transform .08s;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    @media (min-width: 400px) {
      .btn { height: 74px; font-size: 1.2rem; }
    }

    .btn:hover  { background: var(--s2); }
    .btn:active { background: var(--s3); transform: scale(.95); }

    /* Function buttons */
    .btn.fn {
      background: var(--s2);
      color: var(--m);
      font-size: 0.78rem;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .btn.fn:hover  { background: var(--s3); }
    .btn.fn:active { background: #2a2520; }

    /* Operator buttons */
    .btn.op {
      color: var(--a);
      font-size: 1.2rem;
      font-weight: 700;
    }
    .btn.op:hover  { background: rgba(200,160,92,.07); }
    .btn.op:active { background: rgba(200,160,92,.12); transform: scale(.95); }

    /* Equals */
    .btn.eq {
      background: var(--a);
      color: var(--bg);
      font-weight: 700;
      font-size: 1.3rem;
    }
    .btn.eq:hover  { background: #d4a862; }
    .btn.eq:active { background: #b8924e; transform: scale(.95); }

    /* Zero spans 2 cols */
    .btn.zero {
      grid-column: span 2;
      justify-content: flex-start;
      padding-left: 26px;
      font-size: 1.15rem;
    }

    /* Bottom-row rounding */
    .calc-grid .btn:last-child { border-radius: 0 0 20px 0; }
    .calc-grid .btn.zero       { border-radius: 0 0 0 20px; }
  </style>
</head>
<body>
  <div class="calc-card">
    <div class="calc-topbar">
      <a class="home-btn" href="index.html">← Home</a>
      <span class="calc-label">Calculator</span>
      <div class="topbar-right">
        <button id="btn-history" class="home-btn" title="History">▤</button>
        <button id="btn-copy" class="home-btn" title="Copy result">⎘</button>
        <button id="pwa-install-btn" class="home-btn" style="display:none;border-color:rgba(200,160,92,.4);color:var(--a);">↓ Install</button>
      </div>
    </div>

    <div class="calc-display">
      <div id="expr"></div>
      <div id="result">0</div>
      <div class="copy-feedback" id="copy-feedback">Copied</div>
    </div>

    <div class="history-drawer" id="history-drawer">
      <div class="history-header">
        <span class="history-title">History</span>
        <button class="history-clear" id="history-clear">Clear</button>
      </div>
      <ul class="history-list" id="history-list"></ul>
    </div>

    <div class="calc-grid">
      <button class="btn fn" data-action="clear">AC</button>
      <button class="btn fn" data-action="sign">+/−</button>
      <button class="btn fn" data-action="pct">%</button>
      <button class="btn op" data-action="op" data-val="/">÷</button>

      <button class="btn" data-action="num" data-val="7">7</button>
      <button class="btn" data-action="num" data-val="8">8</button>
      <button class="btn" data-action="num" data-val="9">9</button>
      <button class="btn op" data-action="op" data-val="×">×</button>

      <button class="btn" data-action="num" data-val="4">4</button>
      <button class="btn" data-action="num" data-val="5">5</button>
      <button class="btn" data-action="num" data-val="6">6</button>
      <button class="btn op" data-action="op" data-val="−">−</button>

      <button class="btn" data-action="num" data-val="1">1</button>
      <button class="btn" data-action="num" data-val="2">2</button>
      <button class="btn" data-action="num" data-val="3">3</button>
      <button class="btn op" data-action="op" data-val="+">+</button>

      <button class="btn zero" data-action="num" data-val="0">0</button>
      <button class="btn" data-action="dot">.</button>
      <button class="btn eq" data-action="eq">=</button>
    </div>
  </div>

  <script>
    const exprEl   = document.getElementById('expr');
    const resultEl = document.getElementById('result');

    let state = {
      value: '0',
      expr: '',
      op: null,
      prev: null,
      newInput: false
    };

    function fmt(n) {
      const num = parseFloat(n);
      if (isNaN(num)) return n;
      const s = parseFloat(num.toPrecision(10)).toString();
      return s.length > 13 ? num.toExponential(4) : s;
    }

    function render() {
      exprEl.textContent   = state.expr;
      resultEl.textContent = fmt(state.value);
    }

    function flash() {
      resultEl.classList.add('flash');
      setTimeout(() => resultEl.classList.remove('flash'), 300);
    }

    function num(v) {
      if (state.newInput) { state.value = v; state.newInput = false; }
      else state.value = state.value === '0' ? v : state.value + v;
      render();
    }

    function dot() {
      if (state.newInput) { state.value = '0.'; state.newInput = false; }
      else if (!state.value.includes('.')) state.value += '.';
      render();
    }

    function op(o) {
      if (state.op && !state.newInput) compute(false);
      state.prev = state.value;
      state.op   = o;
      state.expr = `${fmt(state.value)} ${o}`;
      state.newInput = true;
      render();
    }

    // ── History ───────────────────────────────────────────────
    const HIST_KEY = 'calcHistory';
    const MAX_HIST = 20;

    function getHistory() {
      try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); }
      catch { return []; }
    }

    function saveToHistory(expr, result) {
      if (!expr || result === 'Error') return;
      const h = getHistory();
      h.unshift({ expr, result });
      if (h.length > MAX_HIST) h.splice(MAX_HIST);
      localStorage.setItem(HIST_KEY, JSON.stringify(h));
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('history-list');
      const h = getHistory();
      list.innerHTML = '';
      if (!h.length) {
        list.innerHTML = '<li class="history-empty">No history yet</li>';
        return;
      }
      h.forEach(entry => {
        const li = document.createElement('li');
        li.className = 'history-item';
        li.innerHTML = `<div class="history-expr">${entry.expr}</div><div class="history-result">${entry.result}</div>`;
        li.addEventListener('click', () => {
          state.value = entry.result.replace(/,/g, '');
          state.expr = '';
          state.op = null;
          state.prev = null;
          state.newInput = false;
          render();
          flash();
        });
        list.appendChild(li);
      });
    }

    document.getElementById('btn-history').addEventListener('click', () => {
      const drawer = document.getElementById('history-drawer');
      drawer.classList.toggle('open');
      if (drawer.classList.contains('open')) renderHistory();
    });

    document.getElementById('history-clear').addEventListener('click', () => {
      localStorage.removeItem(HIST_KEY);
      renderHistory();
    });

    document.getElementById('btn-copy').addEventListener('click', () => {
      navigator.clipboard.writeText(resultEl.textContent).then(() => {
        const fb = document.getElementById('copy-feedback');
        fb.classList.add('show');
        setTimeout(() => fb.classList.remove('show'), 1200);
      });
    });

    function compute(showExpr = true) {
      if (!state.op || state.prev === null) return;
      const a = parseFloat(state.prev), b = parseFloat(state.value);
      let r;
      switch (state.op) {
        case '+': r = a + b; break;
        case '−': r = a - b; break;
        case '×': r = a * b; break;
        case '/': r = b !== 0 ? a / b : 'Error'; break;
        default:  r = b;
      }
      if (showExpr) state.expr = `${fmt(state.prev)} ${state.op} ${fmt(state.value)} =`;
      state.value    = r === 'Error' ? 'Error' : String(r);
      state.op       = null;
      state.prev     = null;
      state.newInput = true;
      render();
      if (showExpr) {
        flash();
        if (r !== 'Error') saveToHistory(state.expr, fmt(parseFloat(state.value)));
      }
    }

    document.querySelector('.calc-grid').addEventListener('click', e => {
      const btn = e.target.closest('.btn');
      if (!btn) return;
      const action = btn.dataset.action;

      if (action === 'num')   num(btn.dataset.val);
      if (action === 'dot')   dot();
      if (action === 'op')    op(btn.dataset.val);
      if (action === 'eq')    compute(true);
      if (action === 'clear') {
        state = { value: '0', expr: '', op: null, prev: null, newInput: false };
        render();
      }
      if (action === 'sign') {
        state.value = String(parseFloat(state.value) * -1);
        render();
      }
      if (action === 'pct') {
        state.value = String(parseFloat(state.value) / 100);
        render();
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') num(e.key);
      else if (e.key === '.') dot();
      else if (e.key === 'Enter' || e.key === '=') compute(true);
      else if (e.key === 'Escape') {
        state = { value: '0', expr: '', op: null, prev: null, newInput: false };
        render();
      }
      else if (e.key === '+') op('+');
      else if (e.key === '-') op('−');
      else if (e.key === '*') op('×');
      else if (e.key === '/') { e.preventDefault(); op('/'); }
      else if (e.key === 'Backspace') {
        if (state.value.length > 1 && state.value !== 'Error') {
          state.value = state.value.slice(0, -1);
        } else {
          state.value = '0';
        }
        render();
      }
    });

    render();
  </script>
<script>
  // ── PWA Install Prompt ────────────────────────────────────────
  (function() {
    var DISMISS_KEY = 'pwaInstallDismissed';
    if (localStorage.getItem(DISMISS_KEY)) return;
    var deferredPrompt = null;
    var btn = document.getElementById('pwa-install-btn');
    if (!btn) return;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      btn.style.display = '';
    });
    btn.addEventListener('click', function() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(r) {
        deferredPrompt = null;
        btn.style.display = 'none';
        if (r.outcome === 'dismissed') localStorage.setItem(DISMISS_KEY, '1');
      });
    });
    window.addEventListener('appinstalled', function() {
      btn.style.display = 'none';
      deferredPrompt = null;
    });
  })();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function(){});
</script>
</body>
</html>
