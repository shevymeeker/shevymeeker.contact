<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0b09">
  <title>Countdown Timers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0d0b09;
      --s1:    #141210;
      --s2:    #1c1916;
      --s3:    #231f1b;
      --b:     #2d2922;
      --a:     #c8a05c;
      --a2:    #5f9ea8;
      --t:     #ede9e2;
      --m:     #9a9390;
      --mono:  'Space Mono', 'Courier New', monospace;
      --serif: 'Instrument Serif', Georgia, serif;
      --sans:  'DM Sans', system-ui, sans-serif;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--t);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: var(--safe-b);
    }

    /* ── Top bar ──────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--b);
      flex-shrink: 0;
      background: rgba(13,11,9,.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .home-btn {
      background: transparent;
      border: 1px solid var(--b);
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 10px;
      font-family: var(--mono);
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--m);
      text-decoration: none;
      transition: border-color .2s, color .2s;
    }
    .home-btn:hover { border-color: var(--a); color: var(--a); }

    .page-title {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.05rem;
      color: var(--t);
    }

    .add-btn {
      background: var(--a);
      border: none;
      border-radius: 4px;
      color: var(--bg);
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 7px 14px;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
      min-height: 34px;
    }
    .add-btn:hover { background: #d4a862; }

    /* ── Add form (slide down) ───────────────────────────────── */
    .add-form-wrap {
      max-height: 0;
      overflow: hidden;
      transition: max-height .3s ease;
      background: var(--s1);
      border-bottom: 1px solid var(--b);
    }

    .add-form-wrap.open { max-height: 420px; }

    .add-form {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .15em;
      font-family: var(--mono);
      font-weight: 700;
      color: var(--m);
      margin-bottom: 5px;
      display: block;
    }

    .form-input {
      background: var(--s2);
      border: 1px solid var(--b);
      border-radius: 6px;
      color: var(--t);
      font-family: var(--sans);
      font-size: 0.9rem;
      padding: 10px 12px;
      outline: none;
      width: 100%;
      transition: border-color .2s;
      color-scheme: dark;
    }
    .form-input:focus { border-color: var(--a); }
    .form-input::placeholder { color: rgba(154,147,144,.3); }

    .form-row {
      display: flex;
      gap: 10px;
    }

    .form-row .form-field { flex: 1; }

    /* Color swatches */
    .color-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .color-label-text {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-family: var(--mono);
      color: var(--m);
      margin-right: 4px;
    }

    .color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: var(--t); transform: scale(1.15); }

    .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .save-btn {
      background: var(--a);
      border: none;
      border-radius: 4px;
      color: var(--bg);
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 9px 20px;
      cursor: pointer;
      transition: background .15s;
    }
    .save-btn:hover { background: #d4a862; }

    .cancel-btn {
      background: none;
      border: 1px solid var(--b);
      border-radius: 4px;
      color: var(--m);
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 9px 16px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .cancel-btn:hover { border-color: var(--m); color: var(--t); }

    /* ── Import from Calendar ────────────────────────────────── */
    .import-section {
      padding: 12px 20px 0;
    }

    .import-btn {
      background: none;
      border: 1px dashed var(--b);
      border-radius: 6px;
      color: var(--m);
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 10px 16px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: border-color .2s, color .2s;
    }
    .import-btn:hover { border-color: var(--a2); color: var(--a2); }

    .import-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 0 0;
    }

    .import-chip {
      background: var(--s1);
      border: 1px solid var(--b);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: border-color .2s, background .15s;
      color: var(--t);
    }
    .import-chip:hover { border-color: var(--a); background: var(--s2); }
    .import-chip .chip-time {
      color: var(--a2);
      font-size: 0.65rem;
      font-family: var(--mono);
    }

    /* ── Countdown list ──────────────────────────────────────── */
    .list-section {
      flex: 1;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 48px 20px;
      color: var(--m);
      text-align: center;
    }

    .empty-state .emoji { font-size: 2.2rem; opacity: .5; }
    .empty-state p {
      font-size: 0.78rem;
      font-family: var(--mono);
      letter-spacing: .05em;
      opacity: .4;
    }

    /* ── Countdown card ──────────────────────────────────────── */
    .cd-card {
      background: var(--s1);
      border: 1px solid var(--b);
      border-radius: 12px;
      padding: 16px;
      border-left-width: 3px;
      transition: border-color .2s;
      position: relative;
      overflow: hidden;
    }

    .cd-card.expired { opacity: .45; }

    .cd-card.today-glow {
      animation: glowPulse 1.6s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 0 rgba(200,160,92,0); }
      50%       { box-shadow: 0 0 20px rgba(200,160,92,.2); }
    }

    .cd-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 8px;
    }

    .cd-label {
      font-size: 0.92rem;
      font-weight: 400;
      line-height: 1.2;
      font-family: var(--serif);
      font-style: italic;
    }

    .cd-date {
      font-size: 0.65rem;
      font-family: var(--mono);
      color: var(--m);
      margin-top: 3px;
      letter-spacing: .04em;
    }

    .cd-delete {
      background: none;
      border: none;
      color: var(--m);
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      line-height: 1;
      transition: color .15s;
      opacity: .4;
    }
    .cd-delete:hover { color: #c46a5a; opacity: 1; }

    /* Digits row */
    .cd-digits {
      display: flex;
      gap: 4px;
      align-items: flex-end;
    }

    .cd-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .cd-num {
      font-size: 1.9rem;
      font-family: var(--mono);
      font-weight: 400;
      letter-spacing: -.03em;
      line-height: 1;
      min-width: 2.2ch;
      text-align: center;
      transition: transform .15s;
    }

    .cd-num.tick {
      animation: tickPop .25s ease;
    }

    @keyframes tickPop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .cd-unit-label {
      font-size: 9px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--m);
      margin-top: 4px;
      opacity: .55;
    }

    .cd-sep {
      font-size: 1.4rem;
      font-family: var(--mono);
      color: rgba(154,147,144,.2);
      padding-bottom: 14px;
      flex-shrink: 0;
    }

    /* Today / expired states */
    .cd-today-msg {
      display: none;
      font-size: 1.4rem;
      font-family: var(--serif);
      font-style: italic;
      text-align: center;
      padding: 8px 0;
      color: var(--a);
    }
    .cd-today-msg.show { display: block; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="home-btn" href="index.html">← Home</a>
    <span class="page-title">Countdown Timers</span>
  </div>
  <button class="add-btn" id="add-btn">+ Add</button>
</div>

<!-- Add form -->
<div class="add-form-wrap" id="add-form-wrap">
  <div class="add-form">
    <div>
      <label class="form-label" for="cd-label-input">Event Name</label>
      <input class="form-input" id="cd-label-input" type="text" placeholder="e.g. Birthday, Vacation, Deadline...">
    </div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label" for="cd-date-input">Date</label>
        <input class="form-input" id="cd-date-input" type="date">
      </div>
      <div class="form-field">
        <label class="form-label" for="cd-time-input">Time (optional)</label>
        <input class="form-input" id="cd-time-input" type="time">
      </div>
    </div>
    <div class="color-row">
      <span class="color-label-text">Color</span>
      <div class="color-swatch selected" data-color="#58a6ff" style="background:#58a6ff;" title="Blue"></div>
      <div class="color-swatch" data-color="#FF453A"  style="background:#FF453A;"  title="Red"></div>
      <div class="color-swatch" data-color="#3fb950"  style="background:#3fb950;"  title="Green"></div>
      <div class="color-swatch" data-color="#d29922"  style="background:#d29922;"  title="Yellow"></div>
      <div class="color-swatch" data-color="#a371f7"  style="background:#a371f7;"  title="Purple"></div>
    </div>
    <div class="form-actions">
      <button class="cancel-btn" id="cancel-btn">Cancel</button>
      <button class="save-btn" id="save-btn">Save</button>
    </div>
  </div>
</div>

<!-- Import from calendar -->
<div class="import-section" id="import-section"></div>

<!-- Countdown list -->
<div class="list-section" id="cd-list"></div>

<script>
  // ── Popup mode: hide topbar ───────────────────────────────────
  if (new URLSearchParams(location.search).get('popup') === '1') {
    const topbar = document.querySelector('.topbar');
    if (topbar) topbar.style.display = 'none';
  }

  // ── Storage ────────────────────────────────────────────────
  function getCountdowns() {
    try { return JSON.parse(localStorage.getItem('utilityCountdowns') || '[]'); }
    catch { return []; }
  }
  function saveCountdowns(data) {
    localStorage.setItem('utilityCountdowns', JSON.stringify(data));
  }
  function uuid() {
    return Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  // ── Add form ───────────────────────────────────────────────
  let selectedColor = '#58a6ff';
  let formOpen = false;

  document.querySelectorAll('.color-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      selectedColor = sw.dataset.color;
    });
  });

  function openForm() {
    formOpen = true;
    document.getElementById('add-form-wrap').classList.add('open');
    document.getElementById('cd-label-input').focus();
    // Default date to tomorrow
    const tom = new Date();
    tom.setDate(tom.getDate() + 1);
    document.getElementById('cd-date-input').value = tom.toISOString().slice(0,10);
  }

  function closeForm() {
    formOpen = false;
    document.getElementById('add-form-wrap').classList.remove('open');
    document.getElementById('cd-label-input').value = '';
    document.getElementById('cd-date-input').value = '';
    document.getElementById('cd-time-input').value = '';
  }

  document.getElementById('add-btn').addEventListener('click', () => {
    if (formOpen) closeForm();
    else openForm();
  });

  document.getElementById('cancel-btn').addEventListener('click', closeForm);

  document.getElementById('save-btn').addEventListener('click', () => {
    const label = document.getElementById('cd-label-input').value.trim();
    const date  = document.getElementById('cd-date-input').value;
    const time  = document.getElementById('cd-time-input').value || '00:00';

    if (!label) { document.getElementById('cd-label-input').focus(); return; }
    if (!date)  { document.getElementById('cd-date-input').focus(); return; }

    const items = getCountdowns();
    items.push({ id: uuid(), label, datetime: `${date}T${time}`, color: selectedColor });
    saveCountdowns(items);
    closeForm();
    renderList();
    buildImportSection();
  });

  // ── Calendar import ────────────────────────────────────────
  function buildImportSection() {
    const sec = document.getElementById('import-section');
    let notes = {};
    try { notes = JSON.parse(localStorage.getItem('utilityNotes') || '{}'); }
    catch {}

    const now = new Date();
    const upcoming = [];
    Object.entries(notes).forEach(([date, dayNotes]) => {
      dayNotes.forEach(n => {
        if (!n.time) return;
        const dt = new Date(`${date}T${n.time}`);
        if (dt > now) upcoming.push({ label: n.text, datetime: `${date}T${n.time}`, dt });
      });
    });
    upcoming.sort((a,b) => a.dt - b.dt);

    if (!upcoming.length) { sec.innerHTML = ''; return; }

    const existingLabels = new Set(getCountdowns().map(c => c.label + c.datetime));
    const fresh = upcoming.filter(u => !existingLabels.has(u.label + u.datetime));
    if (!fresh.length) { sec.innerHTML = ''; return; }

    sec.innerHTML = '';
    const btn = document.createElement('button');
    btn.className = 'import-btn';
    btn.textContent = `📅 Import ${fresh.length} event${fresh.length > 1 ? 's' : ''} from Calendar`;
    btn.addEventListener('click', () => {
      const chips = sec.querySelector('.import-chips');
      if (chips) { chips.remove(); btn.textContent = `📅 Import ${fresh.length} event${fresh.length > 1 ? 's' : ''} from Calendar`; return; }
      btn.textContent = 'Click an event to add it:';
      const wrap = document.createElement('div');
      wrap.className = 'import-chips';
      fresh.slice(0, 8).forEach(u => {
        const chip = document.createElement('button');
        chip.className = 'import-chip';
        const d = new Date(u.datetime);
        const ts = d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        chip.innerHTML = `${u.label} <span class="chip-time">${ts}</span>`;
        chip.addEventListener('click', () => {
          const items = getCountdowns();
          items.push({ id: uuid(), label: u.label, datetime: u.datetime, color: '#58a6ff' });
          saveCountdowns(items);
          chip.remove();
          renderList();
          if (!wrap.children.length) buildImportSection();
        });
        wrap.appendChild(chip);
      });
      sec.appendChild(wrap);
    });
    sec.appendChild(btn);
  }

  // ── Countdown render ───────────────────────────────────────
  function timeDiff(target) {
    const now = Date.now();
    const diff = new Date(target) - now;
    if (diff <= 0) return null;
    const totalSec = Math.floor(diff / 1000);
    const s  = totalSec % 60;
    const m  = Math.floor(totalSec / 60) % 60;
    const h  = Math.floor(totalSec / 3600) % 24;
    const d  = Math.floor(totalSec / 86400);
    return { d, h, m, s };
  }

  function pad(n, len = 2) { return String(n).padStart(len, '0'); }

  let prevVals = {}; // track previous second values for tick animation

  function renderList() {
    const items = getCountdowns();
    const list = document.getElementById('cd-list');

    if (!items.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="emoji">⏳</div>
          <p>No countdowns yet.</p>
          <p>Add an event above or import from Calendar.</p>
        </div>`;
      return;
    }

    // Sort: future first by closeness, then expired
    const sorted = [...items].sort((a, b) => {
      const da = new Date(a.datetime), db = new Date(b.datetime);
      const now = Date.now();
      const fa = da > now, fb = db > now;
      if (fa && !fb) return -1;
      if (!fa && fb) return 1;
      if (fa && fb) return da - db;
      return db - da;
    });

    // Build or update cards
    // We rebuild on first render, then update numbers in-place via updateTicks()
    list.innerHTML = '';
    prevVals = {};

    sorted.forEach(item => {
      const diff = timeDiff(item.datetime);
      const isExpired = !diff;
      const isToday = !isExpired && diff.d === 0 && diff.h === 0 && diff.m === 0;

      const card = document.createElement('div');
      card.className = 'cd-card' + (isExpired ? ' expired' : '');
      card.id = 'card-' + item.id;
      card.style.borderLeftColor = item.color;

      const targetDate = new Date(item.datetime);
      const dateLabel = targetDate.toLocaleString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
        ...(item.datetime.endsWith('T00:00') ? {} : { hour: '2-digit', minute: '2-digit' })
      });

      card.innerHTML = `
        <div class="cd-top">
          <div>
            <div class="cd-label">${escHtml(item.label)}</div>
            <div class="cd-date">${dateLabel}</div>
          </div>
          <button class="cd-delete" data-id="${item.id}" title="Delete">×</button>
        </div>
        <div class="cd-today-msg${isToday ? ' show' : ''}">🎉 It's today!</div>
        <div class="cd-digits" style="${isToday ? 'display:none' : ''}">
          <div class="cd-unit">
            <div class="cd-num" id="d-${item.id}">${diff ? pad(diff.d, 3) : '000'}</div>
            <div class="cd-unit-label">days</div>
          </div>
          <div class="cd-sep">:</div>
          <div class="cd-unit">
            <div class="cd-num" id="h-${item.id}">${diff ? pad(diff.h) : '00'}</div>
            <div class="cd-unit-label">hrs</div>
          </div>
          <div class="cd-sep">:</div>
          <div class="cd-unit">
            <div class="cd-num" id="m-${item.id}">${diff ? pad(diff.m) : '00'}</div>
            <div class="cd-unit-label">min</div>
          </div>
          <div class="cd-sep">:</div>
          <div class="cd-unit">
            <div class="cd-num" id="s-${item.id}">${diff ? pad(diff.s) : '00'}</div>
            <div class="cd-unit-label">sec</div>
          </div>
        </div>`;

      list.appendChild(card);

      if (diff) prevVals[item.id] = diff;
    });

    // Delete handlers
    list.querySelectorAll('.cd-delete').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.id;
        const items = getCountdowns().filter(c => c.id !== id);
        saveCountdowns(items);
        renderList();
        buildImportSection();
      });
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function updateTicks() {
    const items = getCountdowns();
    items.forEach(item => {
      const diff = timeDiff(item.datetime);
      const card = document.getElementById('card-' + item.id);
      if (!card) return;

      if (!diff) {
        // Just expired — re-render to move to expired state
        if (!card.classList.contains('expired')) renderList();
        return;
      }

      // Update only changed numbers
      const prev = prevVals[item.id] || {};
      const fields = [
        { key: 'd', val: diff.d, len: 3 },
        { key: 'h', val: diff.h, len: 2 },
        { key: 'm', val: diff.m, len: 2 },
        { key: 's', val: diff.s, len: 2 },
      ];

      fields.forEach(f => {
        if (prev[f.key] !== f.val) {
          const el = document.getElementById(`${f.key}-${item.id}`);
          if (el) {
            el.textContent = pad(f.val, f.len);
            // Tick animation on seconds
            if (f.key === 's') {
              el.classList.remove('tick');
              void el.offsetWidth; // reflow
              el.classList.add('tick');
            }
          }
        }
      });

      // Check for "today" transition
      const isToday = diff.d === 0 && diff.h === 0 && diff.m === 0;
      const todayMsg = card.querySelector('.cd-today-msg');
      const digitsEl = card.querySelector('.cd-digits');
      if (isToday && todayMsg && !todayMsg.classList.contains('show')) {
        todayMsg.classList.add('show');
        card.classList.add('today-glow');
        if (digitsEl) digitsEl.style.display = 'none';
      }

      prevVals[item.id] = diff;
    });
  }

  // ── Init ───────────────────────────────────────────────────
  buildImportSection();
  renderList();
  setInterval(updateTicks, 1000);

  window.addEventListener('storage', e => {
    if (e.key === 'utilityNotes') buildImportSection();
    if (e.key === 'utilityCountdowns') renderList();
  });
</script>
</body>
</html>
