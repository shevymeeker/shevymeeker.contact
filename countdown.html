<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <title>Countdown Timers</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --surface2:#21262d;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #FF453A;
      --blue:    #58a6ff;
      --green:   #3fb950;
      --yellow:  #d29922;
      --safe-b:  env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: var(--safe-b);
    }

    /* ── Top bar ──────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .home-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      transition: background 0.15s;
    }
    .home-btn:hover { background: rgba(255,255,255,0.14); }

    .page-title { font-size: 1rem; font-weight: 600; }

    .add-btn {
      background: var(--blue);
      border: none;
      border-radius: 8px;
      color: #0d1117;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 7px 14px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .add-btn:hover { opacity: 0.85; }

    /* ── Add form (slide down) ───────────────────────────────── */
    .add-form-wrap {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .add-form-wrap.open {
      max-height: 400px;
    }

    .add-form {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-label {
      font-size: 0.67rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 4px;
      display: block;
    }

    .form-input {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      padding: 10px 12px;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
      color-scheme: dark;
    }
    .form-input:focus { border-color: var(--blue); }
    .form-input::placeholder { color: rgba(255,255,255,0.2); }

    .form-row {
      display: flex;
      gap: 10px;
    }

    .form-row .form-field { flex: 1; }

    /* Color swatches */
    .color-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .color-label-text {
      font-size: 0.67rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-right: 4px;
    }

    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: #fff; transform: scale(1.15); }

    .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .save-btn {
      background: var(--blue);
      border: none;
      border-radius: 8px;
      color: #0d1117;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 9px 20px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .save-btn:hover { opacity: 0.85; }

    .cancel-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.85rem;
      padding: 9px 16px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .cancel-btn:hover { background: var(--surface2); }

    /* ── Import from Calendar ────────────────────────────────── */
    .import-section {
      padding: 12px 16px 0;
    }

    .import-btn {
      background: none;
      border: 1px dashed var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 10px 16px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: border-color 0.15s, color 0.15s;
    }
    .import-btn:hover { border-color: var(--blue); color: var(--blue); }

    .import-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 0 0;
    }

    .import-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      color: var(--text);
    }
    .import-chip:hover { border-color: var(--blue); background: var(--surface2); }
    .import-chip .chip-time { color: var(--blue); font-size: 0.7rem; }

    /* ── Countdown list ──────────────────────────────────────── */
    .list-section {
      flex: 1;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 40px 20px;
      color: var(--muted);
      text-align: center;
    }

    .empty-state .emoji { font-size: 2.5rem; }
    .empty-state p { font-size: 0.85rem; }

    /* ── Countdown card ──────────────────────────────────────── */
    .cd-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      border-left-width: 3px;
      transition: border-color 0.2s;
      position: relative;
      overflow: hidden;
    }

    .cd-card.expired {
      opacity: 0.55;
    }

    .cd-card.today-glow {
      animation: glowPulse 1.5s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 0 rgba(88,166,255,0); }
      50% { box-shadow: 0 0 18px rgba(88,166,255,0.25); }
    }

    .cd-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 8px;
    }

    .cd-label {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .cd-date {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .cd-delete {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      line-height: 1;
      transition: color 0.15s;
    }
    .cd-delete:hover { color: var(--accent); }

    /* Digits row */
    .cd-digits {
      display: flex;
      gap: 4px;
      align-items: flex-end;
    }

    .cd-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .cd-num {
      font-size: 1.9rem;
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      line-height: 1;
      min-width: 2.2ch;
      text-align: center;
      transition: transform 0.15s;
    }

    .cd-num.tick {
      animation: tickPop 0.25s ease;
    }

    @keyframes tickPop {
      0%  { transform: scale(1); }
      50% { transform: scale(1.12); }
      100%{ transform: scale(1); }
    }

    .cd-unit-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-top: 3px;
    }

    .cd-sep {
      font-size: 1.5rem;
      font-weight: 200;
      color: rgba(255,255,255,0.2);
      padding-bottom: 14px;
      flex-shrink: 0;
    }

    /* Today / expired states */
    .cd-today-msg {
      display: none;
      font-size: 1.5rem;
      font-weight: 300;
      text-align: center;
      padding: 8px 0;
    }
    .cd-today-msg.show { display: block; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="home-btn" href="index.html">← Home</a>
    <span class="page-title">Countdown Timers</span>
  </div>
  <button class="add-btn" id="add-btn">+ Add</button>
</div>

<!-- Add form -->
<div class="add-form-wrap" id="add-form-wrap">
  <div class="add-form">
    <div>
      <label class="form-label" for="cd-label-input">Event Name</label>
      <input class="form-input" id="cd-label-input" type="text" placeholder="e.g. Birthday, Vacation, Deadline...">
    </div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label" for="cd-date-input">Date</label>
        <input class="form-input" id="cd-date-input" type="date">
      </div>
      <div class="form-field">
        <label class="form-label" for="cd-time-input">Time (optional)</label>
        <input class="form-input" id="cd-time-input" type="time">
      </div>
    </div>
    <div class="color-row">
      <span class="color-label-text">Color</span>
      <div class="color-swatch selected" data-color="#58a6ff" style="background:#58a6ff;" title="Blue"></div>
      <div class="color-swatch" data-color="#FF453A"  style="background:#FF453A;"  title="Red"></div>
      <div class="color-swatch" data-color="#3fb950"  style="background:#3fb950;"  title="Green"></div>
      <div class="color-swatch" data-color="#d29922"  style="background:#d29922;"  title="Yellow"></div>
      <div class="color-swatch" data-color="#a371f7"  style="background:#a371f7;"  title="Purple"></div>
    </div>
    <div class="form-actions">
      <button class="cancel-btn" id="cancel-btn">Cancel</button>
      <button class="save-btn" id="save-btn">Save</button>
    </div>
  </div>
</div>

<!-- Import from calendar -->
<div class="import-section" id="import-section"></div>

<!-- Countdown list -->
<div class="list-section" id="cd-list"></div>

<script>
  // ── Popup mode: hide topbar ───────────────────────────────────
  if (new URLSearchParams(location.search).get('popup') === '1') {
    const topbar = document.querySelector('.topbar');
    if (topbar) topbar.style.display = 'none';
  }

  // ── Storage ────────────────────────────────────────────────
  function getCountdowns() {
    try { return JSON.parse(localStorage.getItem('utilityCountdowns') || '[]'); }
    catch { return []; }
  }
  function saveCountdowns(data) {
    localStorage.setItem('utilityCountdowns', JSON.stringify(data));
  }
  function uuid() {
    return Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  // ── Add form ───────────────────────────────────────────────
  let selectedColor = '#58a6ff';
  let formOpen = false;

  document.querySelectorAll('.color-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      selectedColor = sw.dataset.color;
    });
  });

  function openForm() {
    formOpen = true;
    document.getElementById('add-form-wrap').classList.add('open');
    document.getElementById('cd-label-input').focus();
    // Default date to tomorrow
    const tom = new Date();
    tom.setDate(tom.getDate() + 1);
    document.getElementById('cd-date-input').value = tom.toISOString().slice(0,10);
  }

  function closeForm() {
    formOpen = false;
    document.getElementById('add-form-wrap').classList.remove('open');
    document.getElementById('cd-label-input').value = '';
    document.getElementById('cd-date-input').value = '';
    document.getElementById('cd-time-input').value = '';
  }

  document.getElementById('add-btn').addEventListener('click', () => {
    if (formOpen) closeForm();
    else openForm();
  });

  document.getElementById('cancel-btn').addEventListener('click', closeForm);

  document.getElementById('save-btn').addEventListener('click', () => {
    const label = document.getElementById('cd-label-input').value.trim();
    const date  = document.getElementById('cd-date-input').value;
    const time  = document.getElementById('cd-time-input').value || '00:00';

    if (!label) { document.getElementById('cd-label-input').focus(); return; }
    if (!date)  { document.getElementById('cd-date-input').focus(); return; }

    const items = getCountdowns();
    items.push({ id: uuid(), label, datetime: `${date}T${time}`, color: selectedColor });
    saveCountdowns(items);
    closeForm();
    renderList();
    buildImportSection();
  });

  // ── Calendar import ────────────────────────────────────────
  function buildImportSection() {
    const sec = document.getElementById('import-section');
    let notes = {};
    try { notes = JSON.parse(localStorage.getItem('utilityNotes') || '{}'); }
    catch {}

    const now = new Date();
    const upcoming = [];
    Object.entries(notes).forEach(([date, dayNotes]) => {
      dayNotes.forEach(n => {
        if (!n.time) return;
        const dt = new Date(`${date}T${n.time}`);
        if (dt > now) upcoming.push({ label: n.text, datetime: `${date}T${n.time}`, dt });
      });
    });
    upcoming.sort((a,b) => a.dt - b.dt);

    if (!upcoming.length) { sec.innerHTML = ''; return; }

    const existingLabels = new Set(getCountdowns().map(c => c.label + c.datetime));
    const fresh = upcoming.filter(u => !existingLabels.has(u.label + u.datetime));
    if (!fresh.length) { sec.innerHTML = ''; return; }

    sec.innerHTML = '';
    const btn = document.createElement('button');
    btn.className = 'import-btn';
    btn.textContent = `📅 Import ${fresh.length} event${fresh.length > 1 ? 's' : ''} from Calendar`;
    btn.addEventListener('click', () => {
      const chips = sec.querySelector('.import-chips');
      if (chips) { chips.remove(); btn.textContent = `📅 Import ${fresh.length} event${fresh.length > 1 ? 's' : ''} from Calendar`; return; }
      btn.textContent = 'Click an event to add it:';
      const wrap = document.createElement('div');
      wrap.className = 'import-chips';
      fresh.slice(0, 8).forEach(u => {
        const chip = document.createElement('button');
        chip.className = 'import-chip';
        const d = new Date(u.datetime);
        const ts = d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        chip.innerHTML = `${u.label} <span class="chip-time">${ts}</span>`;
        chip.addEventListener('click', () => {
          const items = getCountdowns();
          items.push({ id: uuid(), label: u.label, datetime: u.datetime, color: '#58a6ff' });
          saveCountdowns(items);
          chip.remove();
          renderList();
          if (!wrap.children.length) buildImportSection();
        });
        wrap.appendChild(chip);
      });
      sec.appendChild(wrap);
    });
    sec.appendChild(btn);
  }

  // ── Countdown render ───────────────────────────────────────
  function timeDiff(target) {
    const now = Date.now();
    const diff = new Date(target) - now;
    if (diff <= 0) return null;
    const totalSec = Math.floor(diff / 1000);
    const s  = totalSec % 60;
    const m  = Math.floor(totalSec / 60) % 60;
    const h  = Math.floor(totalSec / 3600) % 24;
    const d  = Math.floor(totalSec / 86400);
    return { d, h, m, s };
  }

  function pad(n, len = 2) { return String(n).padStart(len, '0'); }

  let prevVals = {}; // track previous second values for tick animation

  function renderList() {
    const items = getCountdowns();
    const list = document.getElementById('cd-list');

    if (!items.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="emoji">⏳</div>
          <p>No countdowns yet.</p>
          <p>Add an event above or import from Calendar.</p>
        </div>`;
      return;
    }

    // Sort: future first by closeness, then expired
    const sorted = [...items].sort((a, b) => {
      const da = new Date(a.datetime), db = new Date(b.datetime);
      const now = Date.now();
      const fa = da > now, fb = db > now;
      if (fa && !fb) return -1;
      if (!fa && fb) return 1;
      if (fa && fb) return da - db;
      return db - da;
    });

    // Build or update cards
    // We rebuild on first render, then update numbers in-place via updateTicks()
    list.innerHTML = '';
    prevVals = {};

    sorted.forEach(item => {
      const diff = timeDiff(item.datetime);
      const isExpired = !diff;
      const isToday = !isExpired && diff.d === 0 && diff.h === 0 && diff.m === 0;

      const card = document.createElement('div');
      card.className = 'cd-card' + (isExpired ? ' expired' : '');
      card.id = 'card-' + item.id;
      card.style.borderLeftColor = item.color;

      const targetDate = new Date(item.datetime);
      const dateLabel = targetDate.toLocaleString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
        ...(item.datetime.endsWith('T00:00') ? {} : { hour: '2-digit', minute: '2-digit' })
      });

      card.innerHTML = `
        <div class="cd-top">
          <div>
            <div class="cd-label">${escHtml(item.label)}</div>
            <div class="cd-date">${dateLabel}</div>
          </div>
          <button class="cd-delete" data-id="${item.id}" title="Delete">×</button>
        </div>
        <div class="cd-today-msg${isToday ? ' show' : ''}">🎉 It's today!</div>
        <div class="cd-digits" style="${isToday ? 'display:none' : ''}">
          <div class="cd-unit">
            <div class="cd-num" id="d-${item.id}">${diff ? pad(diff.d, 3) : '000'}</div>
            <div class="cd-unit-label">days</div>
          </div>
          <div class="cd-sep">:</div>
          <div class="cd-unit">
            <div class="cd-num" id="h-${item.id}">${diff ? pad(diff.h) : '00'}</div>
            <div class="cd-unit-label">hrs</div>
          </div>
          <div class="cd-sep">:</div>
          <div class="cd-unit">
            <div class="cd-num" id="m-${item.id}">${diff ? pad(diff.m) : '00'}</div>
            <div class="cd-unit-label">min</div>
          </div>
          <div class="cd-sep">:</div>
          <div class="cd-unit">
            <div class="cd-num" id="s-${item.id}">${diff ? pad(diff.s) : '00'}</div>
            <div class="cd-unit-label">sec</div>
          </div>
        </div>`;

      list.appendChild(card);

      if (diff) prevVals[item.id] = diff;
    });

    // Delete handlers
    list.querySelectorAll('.cd-delete').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.id;
        const items = getCountdowns().filter(c => c.id !== id);
        saveCountdowns(items);
        renderList();
        buildImportSection();
      });
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function updateTicks() {
    const items = getCountdowns();
    items.forEach(item => {
      const diff = timeDiff(item.datetime);
      const card = document.getElementById('card-' + item.id);
      if (!card) return;

      if (!diff) {
        // Just expired — re-render to move to expired state
        if (!card.classList.contains('expired')) renderList();
        return;
      }

      // Update only changed numbers
      const prev = prevVals[item.id] || {};
      const fields = [
        { key: 'd', val: diff.d, len: 3 },
        { key: 'h', val: diff.h, len: 2 },
        { key: 'm', val: diff.m, len: 2 },
        { key: 's', val: diff.s, len: 2 },
      ];

      fields.forEach(f => {
        if (prev[f.key] !== f.val) {
          const el = document.getElementById(`${f.key}-${item.id}`);
          if (el) {
            el.textContent = pad(f.val, f.len);
            // Tick animation on seconds
            if (f.key === 's') {
              el.classList.remove('tick');
              void el.offsetWidth; // reflow
              el.classList.add('tick');
            }
          }
        }
      });

      // Check for "today" transition
      const isToday = diff.d === 0 && diff.h === 0 && diff.m === 0;
      const todayMsg = card.querySelector('.cd-today-msg');
      const digitsEl = card.querySelector('.cd-digits');
      if (isToday && todayMsg && !todayMsg.classList.contains('show')) {
        todayMsg.classList.add('show');
        card.classList.add('today-glow');
        if (digitsEl) digitsEl.style.display = 'none';
      }

      prevVals[item.id] = diff;
    });
  }

  // ── Init ───────────────────────────────────────────────────
  buildImportSection();
  renderList();
  setInterval(updateTicks, 1000);

  window.addEventListener('storage', e => {
    if (e.key === 'utilityNotes') buildImportSection();
    if (e.key === 'utilityCountdowns') renderList();
  });
</script>
</body>
</html>
