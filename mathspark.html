<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d0b09">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest-mathspark.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>Math Spark</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"></noscript>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:    #0d0b09;
            --s1:    #1e1b15;
            --s2:    #2b2520;
            --s3:    #37302a;
            --b:     #4a4038;
            --a:     #d4a830;
            --a2:    #5f9ea8;
            --t:     #ede9e2;
            --m:     #a09890;
            --green: #6aab7e;
            --red:   #c46a5a;
            --mono:  'Space Mono', 'Courier New', monospace;
            --serif: 'Instrument Serif', Georgia, serif;
            --sans:  'DM Sans', system-ui, sans-serif;
        }

        html { font-size: 16px; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--t);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--b);
            flex-shrink: 0;
            background: rgba(13,11,9,.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .home-btn {
            background: transparent;
            border: 1px solid var(--b);
            border-radius: 4px;
            padding: 5px 10px;
            font-size: 10px;
            font-family: var(--mono);
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--m);
            text-decoration: none;
            transition: border-color .2s, color .2s;
        }
        .home-btn:hover { border-color: var(--a); color: var(--a); }

        .page-title {
            font-family: var(--serif);
            font-style: italic;
            font-size: 1.05rem;
            color: var(--t);
        }

        .shell {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 28px 20px calc(32px + env(safe-area-inset-bottom));
        }

        .stats-bar {
            width: 100%;
            background: var(--s1);
            border: 1px solid var(--b);
            border-radius: 100px;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .streak {
            font-size: 13px;
            font-weight: 500;
            color: var(--m);
            transition: color .3s;
            font-family: var(--mono);
            letter-spacing: .02em;
        }

        .streak.hot { color: var(--a); }

        .score {
            font-size: 12px;
            font-family: var(--mono);
            color: var(--m);
        }

        .pool-badge {
            font-size: 11px;
            font-family: var(--mono);
            color: var(--a2);
            background: rgba(95,158,168,.12);
            border: 1px solid rgba(95,158,168,.2);
            padding: 3px 10px;
            border-radius: 100px;
        }

        .selector {
            width: 100%;
            background: var(--s1);
            border: 1px solid var(--b);
            border-radius: 100px;
            padding: 4px;
            display: flex;
            gap: 3px;
        }

        .sel-btn {
            flex: 1;
            padding: 9px 6px;
            border: none;
            border-radius: 100px;
            background: transparent;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .06em;
            color: var(--m);
            cursor: pointer;
            transition: background .15s, color .15s, transform .1s;
            min-height: 40px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }

        .sel-btn:hover:not(.active) {
            background: var(--s2);
            color: var(--t);
        }

        .sel-btn.active {
            background: var(--a);
            color: var(--bg);
        }

        .sel-btn:active { transform: scale(.96); }

        .op-selector .sel-btn { font-size: 14px; text-transform: none; }

        .card {
            width: 100%;
            background: var(--s1);
            border-radius: 16px;
            padding: 44px 28px 36px;
            text-align: center;
            border: 1px solid var(--b);
            transition: border-color .22s, background .22s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212,168,48,.35), transparent);
        }

        .card.correct {
            border-color: rgba(106,171,126,.4);
            background: rgba(106,171,126,.05);
        }
        .card.correct::before {
            background: linear-gradient(90deg, transparent, rgba(106,171,126,.5), transparent);
        }

        .card.wrong {
            border-color: rgba(196,106,90,.4);
            background: rgba(196,106,90,.05);
            animation: shake .35s ease;
        }

        @keyframes shake {
            0%   { transform: translateX(0); }
            20%  { transform: translateX(-8px); }
            40%  { transform: translateX(8px); }
            60%  { transform: translateX(-5px); }
            80%  { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }

        @keyframes popIn {
            from { transform: scale(.92); opacity: 0; }
            to   { transform: scale(1);  opacity: 1; }
        }

        .equation {
            font-size: clamp(48px, 14vw, 80px);
            font-family: var(--mono);
            font-weight: 700;
            color: var(--t);
            letter-spacing: -.04em;
            line-height: 1;
            margin-bottom: 18px;
            min-height: 1.1em;
            transition: opacity .2s;
        }

        .equation.idle {
            opacity: .18;
            font-size: clamp(32px, 9vw, 52px);
        }

        .feedback-msg {
            font-size: 15px;
            font-weight: 500;
            min-height: 1.5em;
            line-height: 1.5;
            transition: color .2s;
            font-family: var(--mono);
            letter-spacing: .04em;
        }

        .feedback-msg.hint    { color: var(--m); }
        .feedback-msg.correct { color: var(--green); animation: popIn .2s ease; }
        .feedback-msg.wrong   { color: var(--red);   animation: popIn .2s ease; }

        .input-row {
            width: 100%;
            display: flex;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
            transition: opacity .2s, transform .2s;
        }

        .input-row.visible {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        #answerInput {
            flex: 1;
            background: var(--s1);
            border: 1px solid var(--b);
            border-radius: 10px;
            color: var(--t);
            font-family: var(--mono);
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            padding: 14px 16px;
            min-height: 58px;
            outline: none;
            transition: border-color .2s;
            -moz-appearance: textfield;
            letter-spacing: -.02em;
        }

        #answerInput::-webkit-outer-spin-button,
        #answerInput::-webkit-inner-spin-button { -webkit-appearance: none; }

        #answerInput:focus { border-color: var(--a); }

        #answerInput::placeholder {
            color: rgba(154,147,144,.3);
            font-size: 14px;
            font-weight: 400;
        }

        #checkButton {
            background: var(--a);
            border: none;
            border-radius: 10px;
            color: var(--bg);
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: 14px 18px;
            min-height: 58px;
            min-width: 84px;
            cursor: pointer;
            transition: background .15s, transform .1s;
        }

        #checkButton:hover  { background: #d4a862; }
        #checkButton:active { transform: scale(.95); }

        .action-btn {
            width: 100%;
            padding: 17px;
            border: 1px solid var(--b);
            border-radius: 10px;
            background: var(--s2);
            color: var(--t);
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .15s, border-color .2s, color .2s, transform .1s;
            min-height: 58px;
        }

        .action-btn:hover  { background: var(--s3); border-color: var(--a); color: var(--a); }
        .action-btn:active { transform: scale(.98); }

        .action-btn.next {
            background: rgba(106,171,126,.12);
            border-color: rgba(106,171,126,.3);
            color: var(--green);
        }

        .action-btn.next:hover {
            background: rgba(106,171,126,.2);
            border-color: var(--green);
        }

        @media (max-width: 380px) {
            .shell { padding: 20px 12px calc(24px + env(safe-area-inset-bottom)); }
            .equation { font-size: 42px; }
            .sel-btn { font-size: 10px; padding: 8px 4px; }
        }
    </style>
</head>
<body>
<div class="topbar">
    <a class="home-btn" href="index.html">← Home</a>
    <span class="page-title">Math Spark</span>
    <div style="width:60px"></div>
</div>
<div class="shell">

    <div class="stats-bar" role="status" aria-label="Game stats">
        <span class="streak" id="streakDisplay" aria-label="Streak">🔥 0 streak</span>
        <span class="score"  id="scoreDisplay"  aria-label="Score">0 / 0</span>
        <span class="pool-badge" id="poolDisplay" aria-label="Problems remaining">— left</span>
    </div>

    <div class="selector" id="diffSelector">
        <button class="sel-btn active" data-diff="easy">Easy</button>
        <button class="sel-btn"        data-diff="medium">Medium</button>
        <button class="sel-btn"        data-diff="hard">Hard</button>
    </div>

    <div id="opSelector" class="selector op-selector" role="group" aria-label="Operation">
        <button class="sel-btn active" id="additionLink"       type="button" aria-label="Addition">＋</button>
        <button class="sel-btn"        id="subtractionLink"    type="button" aria-label="Subtraction">－</button>
        <button class="sel-btn"        id="multiplicationLink" type="button" aria-label="Multiplication">×</button>
        <button class="sel-btn"        id="divisionLink"       type="button" aria-label="Division">÷</button>
    </div>

    <div class="card" id="displayCard">
        <div class="equation idle" id="displayNumbers">? ○ ?</div>
        <div class="feedback-msg hint" id="feedbackMsg" aria-live="polite" aria-atomic="true">tap New Problem to start</div>
    </div>

    <div class="input-row" id="inputZone">
        <input
            id="answerInput"
            type="number"
            inputmode="decimal"
            autocomplete="off"
            placeholder="your answer"
            aria-label="Type your answer"
        >
        <button id="checkButton">Check ✓</button>
    </div>

    <button class="action-btn" id="actionButton">New Problem</button>

</div>

<script>
const state = {
    phase:      'idle',
    op:         'addition',
    difficulty: 'easy',
    num1:       0,
    num2:       0,
    correct:    0,
    total:      0,
    streak:     0,
    pool:       [],
    poolIndex:  0,
    lastKey:    null,
};

const ops = {
    addition:       { symbol: '+', compute: (a, b) => a + b                          },
    subtraction:    { symbol: '−', compute: (a, b) => a - b                          },
    multiplication: { symbol: '×', compute: (a, b) => a * b                          },
    division:       { symbol: '÷', compute: (a, b) => parseFloat((a / b).toFixed(2)) },
};

const ranges = {
    easy:   { a: [2, 12],   b: [2, 12]  },
    medium: { a: [10, 50],  b: [2, 20]  },
    hard:   { a: [50, 200], b: [10, 50] },
};

const els = {
    equation:      document.getElementById('displayNumbers'),
    feedbackMsg:   document.getElementById('feedbackMsg'),
    card:          document.getElementById('displayCard'),
    inputZone:     document.getElementById('inputZone'),
    answerInput:   document.getElementById('answerInput'),
    checkButton:   document.getElementById('checkButton'),
    actionButton:  document.getElementById('actionButton'),
    streakDisplay: document.getElementById('streakDisplay'),
    scoreDisplay:  document.getElementById('scoreDisplay'),
    poolDisplay:   document.getElementById('poolDisplay'),
};

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function buildPool() {
    const { a, b } = ranges[state.difficulty];
    const pairs = [];
    if (state.op === 'division') {
        for (let divisor = b[0]; divisor <= b[1]; divisor++) {
            const minM = Math.max(2, Math.ceil(a[0] / divisor));
            const maxM = Math.floor(a[1] / divisor);
            for (let m = minM; m <= maxM; m++) pairs.push([divisor * m, divisor]);
        }
    } else {
        for (let n1 = a[0]; n1 <= a[1]; n1++)
            for (let n2 = b[0]; n2 <= b[1]; n2++)
                pairs.push([n1, n2]);
    }
    return shuffle(pairs);
}

function resetPool() {
    state.pool      = buildPool();
    state.poolIndex = 0;
    state.lastKey   = null;
}

function nextFromPool() {
    if (state.poolIndex >= state.pool.length) {
        state.pool = buildPool();
        if (state.pool.length > 1 && state.pool[0].join() === state.lastKey)
            [state.pool[0], state.pool[1]] = [state.pool[1], state.pool[0]];
        state.poolIndex = 0;
    }
    const pair = state.pool[state.poolIndex++];
    state.lastKey = pair.join();
    return pair;
}

function correctAnswer() {
    return ops[state.op].compute(state.num1, state.num2);
}

function render() {
    const { phase, streak, correct, total } = state;
    const op = ops[state.op];

    if (phase === 'idle') {
        els.equation.textContent = '? ○ ?';
        els.equation.className   = 'equation idle';
    } else {
        els.equation.textContent = `${state.num1} ${op.symbol} ${state.num2}`;
        els.equation.className   = 'equation';
    }

    els.card.className = 'card';
    if (phase === 'feedback-correct') els.card.classList.add('correct');
    if (phase === 'feedback-wrong')   els.card.classList.add('wrong');

    const msgs = {
        'idle':             ['tap New Problem to start', 'hint'],
        'answering':        ['', ''],
        'feedback-correct': ['✓  Correct!',                 'correct'],
        'feedback-wrong':   [`✗  Answer: ${correctAnswer()}`, 'wrong'],
    };
    const [msg, cls] = msgs[phase] || ['', ''];
    els.feedbackMsg.textContent = msg;
    els.feedbackMsg.className   = cls ? `feedback-msg ${cls}` : 'feedback-msg';

    els.inputZone.classList.toggle('visible', phase === 'answering');

    const inFeedback = phase === 'feedback-correct' || phase === 'feedback-wrong';
    els.actionButton.textContent = inFeedback ? 'Next Problem →' : 'New Problem';
    els.actionButton.className   = inFeedback ? 'action-btn next' : 'action-btn';

    els.streakDisplay.textContent = `🔥 ${streak} streak`;
    els.streakDisplay.className   = streak >= 5 ? 'streak hot' : 'streak';
    els.scoreDisplay.textContent  = `${correct} / ${total}`;
    const left = state.pool.length - state.poolIndex;
    els.poolDisplay.textContent   = `${left} left`;
}

function startNewProblem() {
    const [n1, n2] = nextFromPool();
    state.num1  = n1;
    state.num2  = n2;
    state.phase = 'answering';
    els.answerInput.value = '';
    render();
    requestAnimationFrame(() => els.answerInput.focus());
}

function checkAnswer() {
    const raw = els.answerInput.value.trim();
    if (!raw) return;

    const userVal   = parseFloat(raw);
    const answerVal = correctAnswer();
    const isCorrect = Math.abs(userVal - answerVal) < 0.01;

    state.total++;
    if (isCorrect) {
        state.correct++;
        state.streak++;
        state.phase = 'feedback-correct';
    } else {
        state.streak = 0;
        state.phase  = 'feedback-wrong';
    }

    render();
    setTimeout(() => { if (state.phase !== 'idle') startNewProblem(); }, 1500);
}

function handleAction() {
    if (state.phase !== 'answering') startNewProblem();
}

Object.keys(ops).forEach(opKey => {
    document.getElementById(`${opKey}Link`).addEventListener('click', () => {
        if (state.op === opKey) return;
        state.op    = opKey;
        state.phase = 'idle';
        resetPool();
        document.querySelectorAll('#opSelector .sel-btn').forEach(a => a.classList.remove('active'));
        document.getElementById(`${opKey}Link`).classList.add('active');
        render();
    });
});

document.querySelectorAll('#diffSelector .sel-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        if (state.difficulty === btn.dataset.diff) return;
        document.querySelectorAll('#diffSelector .sel-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.difficulty = btn.dataset.diff;
        state.phase      = 'idle';
        resetPool();
        render();
    });
});

els.checkButton.addEventListener('click', checkAnswer);
els.answerInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(); });
els.actionButton.addEventListener('click',  handleAction);
els.actionButton.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); handleAction(); }
});

resetPool();
render();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function(){});
</script>
</body>
</html>
