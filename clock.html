<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Meta tags added due to entries.js deprecation on July 8th, 2025 -->
  <meta name="description" content="Analog/digital clock with alarm scheduling linked to calendar events.">
  
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0b09">
  <link rel="manifest" href="/manifest-clock.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Clock & Alarms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"></noscript>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #0d0b09;
      --surface: #141210;
      --surface2:#1c1916;
      --border:  #2d2922;
      --text:    #ede9e2;
      --text-muted: #9a9390;
      --accent:  #c8a05c;
      --blue:    #5f9ea8;
      --mono:    'Space Mono', 'Courier New', monospace;
      --serif:   'Instrument Serif', Georgia, serif;
      --sans:    'DM Sans', system-ui, sans-serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    body.light {
      --bg:      #ede9e2;
      --surface: #e0dbd2;
      --surface2:#d4cfc5;
      --border:  rgba(0,0,0,0.12);
      --text:    #1c1916;
      --text-muted: rgba(0,0,0,0.45);
    }

    /* ── Top bar ──────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: rgba(13,11,9,.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    body.light .topbar {
      background: rgba(237,233,226,.92);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .home-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 10px;
      font-family: var(--mono);
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: border-color .2s, color .2s;
    }
    .home-btn:hover { border-color: var(--accent); color: var(--accent); }

    .page-title {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.05rem;
      color: var(--text);
    }

    .topbar-right {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 10px;
      font-family: var(--mono);
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color .2s, color .2s;
      white-space: nowrap;
    }
    .icon-btn:hover { border-color: var(--text-muted); color: var(--text); }
    .icon-btn.active { border-color: var(--blue); color: var(--blue); }

    /* ── Layout ────────────────────────────────── */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    @media (min-width: 720px) {
      .main-content {
        flex-direction: row;
        align-items: flex-start;
        justify-content: center;
        gap: 40px;
        padding: 32px 24px;
      }
    }

    /* ── Clock face ──────────────────────────────── */
    .clock-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px 20px;
      flex-shrink: 0;
    }

    .clock {
      width: 280px;
      height: 280px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg);
      border: 16px solid var(--bg);
      border-radius: 50%;
      box-shadow:
        -6px -6px 12px rgba(255,255,255,0.05),
        16px 16px 16px rgba(0,0,0,0.3),
        inset -6px -6px 12px rgba(255,255,255,0.05),
        inset 16px 16px 16px rgba(0,0,0,0.3);
      position: relative;
    }

    body.light .clock {
      background: var(--bg);
      border-color: #d4cfc5;
      box-shadow:
        -6px -6px 12px rgba(255,255,255,0.5),
        8px 8px 8px rgba(0,0,0,0.15),
        inset -6px -6px 12px rgba(255,255,255,0.5),
        inset 8px 8px 8px rgba(0,0,0,0.15);
    }

    .clock::before {
      content: '';
      position: absolute;
      height: 10px;
      width: 10px;
      background: var(--accent);
      border-radius: 50%;
      z-index: 100000;
    }

    body.light .clock::before { background: var(--blue); }

    .indicators div {
      position: absolute;
      width: 2px;
      height: 10px;
      background: #3a3530;
    }

    body.light .indicators div { background: #9a9390; }

    .indicators div:nth-child(1)  { transform: rotate(30deg)  translateY(-104px) translateX(-2px); }
    .indicators div:nth-child(2)  { transform: rotate(60deg)  translateY(-104px) translateX(-4px); }
    .indicators div:nth-child(3)  { transform: rotate(120deg) translateY(-104px) translateX(-4px); }
    .indicators div:nth-child(4)  { transform: rotate(150deg) translateY(-104px) translateX(-2px); }
    .indicators div:nth-child(5)  { transform: rotate(210deg) translateY(-104px) translateX(3px); }
    .indicators div:nth-child(6)  { transform: rotate(240deg) translateY(-104px) translateX(5px); }
    .indicators div:nth-child(7)  { transform: rotate(300deg) translateY(-104px) translateX(4px); }
    .indicators div:nth-child(8)  { transform: rotate(330deg) translateY(-104px) translateX(2px); }

    .nums { position: absolute; font-size: 18px; font-family: var(--mono); font-weight: 400; color: var(--text-muted); }

    #three  { position: absolute; left: 95px;  top: -12px; }
    #six    { position: absolute; top: 87px;   left: -6px; }
    #nine   { position: absolute; right: 95px; top: -12px; }
    #twelve { position: absolute; bottom: 87px; left: -12px; }

    .clock .hour, .clock .min, .clock .sec {
      position: absolute;
      z-index: 10;
    }

    .hour, .hr { height: 128px; width: 128px; }
    .min,  .mn { height: 152px; width: 152px; }
    .sec,  .sc { height: 184px; width: 184px; }

    .hr, .mn, .sc {
      display: flex;
      justify-content: center;
      position: absolute;
      border-radius: 50%;
    }

    .hr::before {
      content: '';
      position: absolute;
      width: 7px;
      height: 64px;
      background: var(--accent);
      z-index: 10;
      border-radius: 5px 5px 0 0;
    }

    .mn::before {
      content: '';
      position: absolute;
      width: 4px;
      height: 72px;
      background: var(--text);
      z-index: 11;
      border-radius: 5px 5px 0 0;
    }

    body.light .mn::before { background: #1c1916; }

    .sc::before {
      content: '';
      position: absolute;
      width: 2px;
      height: 120px;
      background: var(--blue);
      z-index: 12;
      border-radius: 5px 5px 0 0;
    }

    .time {
      margin-top: 20px;
      font-size: 0.88rem;
      font-family: var(--mono);
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: .1em;
    }

    /* ── Alarm panel ──────────────────────────── */
    .alarm-panel {
      width: 100%;
      max-width: 420px;
      border-top: 1px solid var(--border);
      padding: 0 0 16px;
      display: none;
    }

    @media (min-width: 720px) {
      .alarm-panel {
        border-top: none;
        border-left: 1px solid var(--border);
        padding: 0 0 0 32px;
        max-width: 340px;
        display: flex !important;
        flex-direction: column;
        height: auto;
        overflow-y: auto;
      }
    }

    .alarm-panel.open { display: flex; flex-direction: column; }

    .panel-section-title {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .18em;
      font-family: var(--mono);
      font-weight: 700;
      color: var(--text-muted);
      padding: 16px 16px 8px;
    }

    /* Add alarm form */
    .add-alarm-form {
      padding: 0 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }

    .form-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .alarm-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 8px 10px;
      outline: none;
      transition: border-color .2s;
      color-scheme: dark;
    }

    body.light .alarm-input { color-scheme: light; }

    .alarm-input:focus { border-color: var(--accent); }
    .alarm-input::placeholder { color: var(--text-muted); opacity: .5; }

    #alarm-label { flex: 1; min-width: 120px; }
    #alarm-date  { flex: 1; min-width: 130px; }
    #alarm-time  { flex-shrink: 0; }

    .add-alarm-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
      align-self: flex-end;
      transition: background .15s;
    }
    .add-alarm-btn:hover { background: #d4a862; }

    /* Alarms list */
    .alarms-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .no-alarms {
      color: var(--text-muted);
      font-size: 0.78rem;
      text-align: center;
      padding: 16px 0;
      font-family: var(--mono);
      opacity: .5;
    }

    .alarm-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .alarm-item.fired { opacity: 0.35; }

    .alarm-item-info { flex: 1; min-width: 0; }

    .alarm-item-label {
      font-size: 0.85rem;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .alarm-item-time {
      font-size: 0.7rem;
      font-family: var(--mono);
      color: var(--blue);
      margin-top: 3px;
    }

    .alarm-item-source {
      font-size: 0.65rem;
      font-family: var(--mono);
      color: var(--text-muted);
      margin-top: 2px;
      opacity: .6;
    }

    .alarm-toggle {
      flex-shrink: 0;
      width: 38px;
      height: 22px;
      border-radius: 11px;
      border: none;
      background: var(--surface2);
      cursor: pointer;
      position: relative;
      transition: background .2s;
      margin-top: 3px;
    }

    .alarm-toggle.on { background: var(--blue); }

    .alarm-toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      transition: transform .2s;
    }

    .alarm-toggle.on::after { transform: translateX(16px); }

    .alarm-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
      margin-top: 2px;
      transition: color .15s;
      opacity: .5;
    }
    .alarm-delete:hover { color: #c46a5a; opacity: 1; }

    /* ── Firing alert banner ──────────────────── */
    #alarm-alert {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--accent);
      color: var(--bg);
      padding: 14px 20px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 1000;
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: .05em;
      box-shadow: 0 4px 20px rgba(200,160,92,.4);
    }

    #alarm-alert.show { display: flex; }

    #alarm-alert-text { flex: 1; }

    .alert-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    #snooze-5-btn, #snooze-10-btn, #dismiss-alert {
      background: rgba(0,0,0,.2);
      border: none;
      color: var(--bg);
      border-radius: 4px;
      padding: 5px 10px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    #snooze-5-btn:hover, #snooze-10-btn:hover { background: rgba(0,0,0,.3); }
    #dismiss-alert { background: rgba(0,0,0,.35); }
  </style>
</head>
<body class="dark">

<div id="alarm-alert">
  <span>🔔</span>
  <span id="alarm-alert-text">Alarm!</span>
  <div class="alert-actions">
    <button id="snooze-5-btn">Snooze 5m</button>
    <button id="snooze-10-btn">Snooze 10m</button>
    <button id="dismiss-alert">Dismiss</button>
  </div>
</div>

<div class="topbar">
  <div class="topbar-left">
    <a class="home-btn" href="index.html">← Home</a>
    <span class="page-title">Clock &amp; Alarms</span>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" id="toggle-alarms">🔔 Alarms</button>
    <button class="icon-btn" id="toggle-theme">☀️ Light</button>
    <button id="pwa-install-btn" class="home-btn" style="display:none;border-color:rgba(200,160,92,.4);color:var(--accent);">↓ Install</button>
  </div>
</div>

<div class="main-content">
  <!-- Clock -->
  <div class="clock-section">
    <div class="clock">
      <div class="hour"><div class="hr" id="hr"></div></div>
      <div class="min"><div class="mn" id="mn"></div></div>
      <div class="sec"><div class="sc" id="sc"></div></div>
      <div class="indicators">
        <div></div><div></div><div></div><div></div>
        <div></div><div></div><div></div><div></div>
      </div>
      <div class="nums">
        <span id="three">3</span>
        <span id="six">6</span>
        <span id="nine">9</span>
        <span id="twelve">12</span>
      </div>
    </div>
    <div class="time" id="digital-time"></div>
  </div>

  <!-- Alarm panel -->
  <div class="alarm-panel" id="alarm-panel">
    <p class="panel-section-title">Add Alarm</p>
    <div class="add-alarm-form">
      <input class="alarm-input" type="text" id="alarm-label" placeholder="Label (e.g. Meeting)">
      <div class="form-row">
        <input class="alarm-input" type="date" id="alarm-date">
        <input class="alarm-input" type="time" id="alarm-time">
      </div>
      <div class="form-row" style="align-items:center;gap:8px;">
        <label style="font-size:9px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);white-space:nowrap;">Repeat</label>
        <select class="alarm-input" id="alarm-repeat" style="flex:1;">
          <option value="none">No repeat</option>
          <option value="daily">Daily</option>
          <option value="weekdays">Weekdays only</option>
        </select>
      </div>
      <button class="add-alarm-btn" id="add-alarm-btn">+ Add Alarm</button>
    </div>
    <p class="panel-section-title">Scheduled Alarms</p>
    <div class="alarms-list" id="alarms-list"></div>
    <p style="font-size:0.65rem; color:var(--text-muted); padding:12px 16px 0; line-height:1.4;">
      🔔 Alarms fire when the browser is running. Install as a PWA for background alarm support even when no tab is open.
    </p>
  </div>
</div>

<script>
  // ── Popup mode: hide topbar ────────────────────────────────
  if (new URLSearchParams(location.search).get('popup') === '1') {
    const topbar = document.querySelector('.topbar');
    if (topbar) topbar.style.display = 'none';
  }

  // ── Storage helpers ───────────────────────────────────────
  function getAlarms() {
    try { return JSON.parse(localStorage.getItem('utilityAlarms') || '[]'); }
    catch { return []; }
  }
  function saveAlarms(data) {
    localStorage.setItem('utilityAlarms', JSON.stringify(data));
    syncAlarmsToIDB(data); // keep IndexedDB in sync for SW background checks
  }
  function uuid() {
    return Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  // ── IndexedDB helpers (for service worker background alarm checks) ───
  function openAlarmDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('utilities-alarm-db', 1);
      req.onupgradeneeded = e => {
        if (!e.target.result.objectStoreNames.contains('alarms')) {
          e.target.result.createObjectStore('alarms', { keyPath: 'id' });
        }
      };
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = e => reject(e.target.error);
    });
  }

  async function syncAlarmsToIDB(alarms) {
    try {
      const db = await openAlarmDB();
      const tx = db.transaction('alarms', 'readwrite');
      const store = tx.objectStore('alarms');
      store.clear();
      alarms.forEach(a => store.put(a));
      db.close();
    } catch(e) {}
  }

  // On startup, merge any fired-by-SW status back from IndexedDB into localStorage
  async function mergeIDBFiredStatus() {
    try {
      const db = await openAlarmDB();
      const idbAlarms = await new Promise((res, rej) => {
        const req = db.transaction('alarms', 'readonly').objectStore('alarms').getAll();
        req.onsuccess = e => res(e.target.result);
        req.onerror = e => rej(e.target.error);
      });
      db.close();
      if (!idbAlarms.length) return;
      const local = getAlarms();
      const idbMap = Object.fromEntries(idbAlarms.map(a => [a.id, a]));
      let changed = false;
      local.forEach(a => {
        if (idbMap[a.id] && idbMap[a.id].fired && !a.fired) {
          a.fired = true;
          firedIds.add(a.id);
          changed = true;
        }
      });
      if (changed) {
        localStorage.setItem('utilityAlarms', JSON.stringify(local));
        renderAlarmsList();
      }
    } catch(e) {}
  }

  // ── Clock hands ───────────────────────────────────────────
  const hr = document.querySelector('#hr');
  const mn = document.querySelector('#mn');
  const sc = document.querySelector('#sc');
  const digitalTime = document.getElementById('digital-time');

  let firedIds = new Set();

  setInterval(() => {
    const day = new Date();
    const hour = day.getHours();
    const min = day.getMinutes();
    const sec = day.getSeconds();

    hr.style.transform = `rotateZ(${hour * 30 + min / 2}deg)`;
    mn.style.transform = `rotateZ(${min * 6}deg)`;
    sc.style.transform = `rotateZ(${sec * 6}deg)`;

    digitalTime.textContent =
      String(hour).padStart(2,'0') + ' : ' +
      String(min).padStart(2,'0') + ' : ' +
      String(sec).padStart(2,'0');

    // Check alarms every tick
    checkAlarms(day);
  }, 1000);

  // ── Alarm check ───────────────────────────────────────────
  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playAlarmSound() {
    try {
      const ctx = getAudioCtx();
      const beepPattern = [0, 0.3, 0.6];
      beepPattern.forEach(offset => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.4, ctx.currentTime + offset);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.25);
        osc.start(ctx.currentTime + offset);
        osc.stop(ctx.currentTime + offset + 0.25);
      });
    } catch(e) {}
  }

  let currentFiringAlarm = null;

  function snoozeAlarm(minutes) {
    document.getElementById('alarm-alert').classList.remove('show');
    if (!currentFiringAlarm) return;
    const snoozeTime = new Date(Date.now() + minutes * 60 * 1000);
    const pad2 = n => String(n).padStart(2, '0');
    const dateStr = `${snoozeTime.getFullYear()}-${pad2(snoozeTime.getMonth()+1)}-${pad2(snoozeTime.getDate())}`;
    const timeStr = `${pad2(snoozeTime.getHours())}:${pad2(snoozeTime.getMinutes())}`;
    const alarms = getAlarms();
    alarms.push({
      id: uuid(),
      datetime: `${dateStr}T${timeStr}`,
      label: `${currentFiringAlarm.label} (snoozed)`,
      active: true,
      fired: false,
      repeat: 'none',
    });
    saveAlarms(alarms);
    renderAlarmsList();
    currentFiringAlarm = null;
  }

  document.getElementById('snooze-5-btn').addEventListener('click', () => snoozeAlarm(5));
  document.getElementById('snooze-10-btn').addEventListener('click', () => snoozeAlarm(10));

  function fireAlarm(alarm) {
    currentFiringAlarm = alarm;
    // In-app banner
    const alertEl = document.getElementById('alarm-alert');
    document.getElementById('alarm-alert-text').textContent = '🔔 ' + alarm.label;
    alertEl.classList.add('show');
    setTimeout(() => alertEl.classList.remove('show'), 12000);

    // Audio
    playAlarmSound();

    // Browser notification
    if (Notification.permission === 'granted') {
      new Notification('⏰ Alarm', {
        body: alarm.label,
        icon: './manifest.json',
        requireInteraction: true
      });
    } else if (Notification.permission !== 'denied') {
      Notification.requestPermission().then(p => {
        if (p === 'granted') {
          new Notification('⏰ Alarm', { body: alarm.label, requireInteraction: true });
        }
      });
    }
  }

  function nextOccurrence(alarm) {
    const dt = new Date(alarm.datetime);
    if (alarm.repeat === 'daily') {
      dt.setDate(dt.getDate() + 1);
    } else if (alarm.repeat === 'weekdays') {
      do { dt.setDate(dt.getDate() + 1); } while (dt.getDay() === 0 || dt.getDay() === 6);
    }
    const pad2 = n => String(n).padStart(2, '0');
    return `${dt.getFullYear()}-${pad2(dt.getMonth()+1)}-${pad2(dt.getDate())}T${pad2(dt.getHours())}:${pad2(dt.getMinutes())}`;
  }

  function checkAlarms(now) {
    const alarms = getAlarms();
    let changed = false;

    alarms.forEach(alarm => {
      if (!alarm.active || alarm.fired) return;
      if (firedIds.has(alarm.id)) return;

      const alarmTime = new Date(alarm.datetime);
      const diffSec = (now - alarmTime) / 1000;
      if (diffSec >= 0 && diffSec < 60) {
        firedIds.add(alarm.id);
        changed = true;
        if (alarm.repeat && alarm.repeat !== 'none') {
          // Advance to next occurrence instead of marking fired
          alarm.datetime = nextOccurrence(alarm);
          firedIds.delete(alarm.id); // allow it to fire again
        } else {
          alarm.fired = true;
        }
        fireAlarm(alarm);
      }
    });

    if (changed) {
      saveAlarms(alarms);
      renderAlarmsList();
    }
  }

  // ── Alarm UI ──────────────────────────────────────────────
  function renderAlarmsList() {
    const alarms = getAlarms();
    const list = document.getElementById('alarms-list');
    list.innerHTML = '';

    if (!alarms.length) {
      list.innerHTML = '<p class="no-alarms">No alarms scheduled.<br>Add one above or via the Calendar.</p>';
      return;
    }

    // Sort: upcoming first, fired last
    const sorted = [...alarms].sort((a, b) => {
      if (a.fired !== b.fired) return a.fired ? 1 : -1;
      return new Date(a.datetime) - new Date(b.datetime);
    });

    sorted.forEach(alarm => {
      const item = document.createElement('div');
      item.className = 'alarm-item' + (alarm.fired ? ' fired' : '');

      const info = document.createElement('div');
      info.className = 'alarm-item-info';

      const label = document.createElement('div');
      label.className = 'alarm-item-label';
      label.textContent = alarm.label || 'Alarm';
      label.title = alarm.label;

      const dt = new Date(alarm.datetime);
      const timeEl = document.createElement('div');
      timeEl.className = 'alarm-item-time';
      timeEl.textContent = dt.toLocaleString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });

      info.appendChild(label);
      info.appendChild(timeEl);
      if (alarm.repeat && alarm.repeat !== 'none') {
        const rep = document.createElement('div');
        rep.className = 'alarm-item-source';
        rep.textContent = alarm.repeat === 'daily' ? '↻ Daily' : '↻ Weekdays';
        info.appendChild(rep);
      } else if (alarm.fired) {
        const src = document.createElement('div');
        src.className = 'alarm-item-source';
        src.textContent = 'Fired';
        info.appendChild(src);
      }

      const toggle = document.createElement('button');
      toggle.className = 'alarm-toggle' + (alarm.active ? ' on' : '');
      toggle.title = alarm.active ? 'Disable' : 'Enable';
      toggle.addEventListener('click', () => {
        const list = getAlarms();
        const a = list.find(x => x.id === alarm.id);
        if (a) {
          a.active = !a.active;
          if (a.active) { a.fired = false; firedIds.delete(a.id); }
          saveAlarms(list);
          renderAlarmsList();
        }
      });

      const del = document.createElement('button');
      del.className = 'alarm-delete';
      del.innerHTML = '&times;';
      del.title = 'Delete alarm';
      del.addEventListener('click', () => {
        const list = getAlarms().filter(x => x.id !== alarm.id);
        saveAlarms(list);
        firedIds.delete(alarm.id);
        renderAlarmsList();
      });

      item.appendChild(info);
      item.appendChild(toggle);
      item.appendChild(del);
      list.appendChild(item);
    });
  }

  // Add alarm button
  document.getElementById('add-alarm-btn').addEventListener('click', () => {
    const label = document.getElementById('alarm-label').value.trim() || 'Alarm';
    const date = document.getElementById('alarm-date').value;
    const time = document.getElementById('alarm-time').value;

    if (!date || !time) {
      alert('Please set both a date and time for the alarm.');
      return;
    }

    const repeat = document.getElementById('alarm-repeat').value;
    const alarms = getAlarms();
    alarms.push({
      id: uuid(),
      datetime: `${date}T${time}`,
      label,
      active: true,
      fired: false,
      repeat,
    });
    saveAlarms(alarms);

    document.getElementById('alarm-label').value = '';
    document.getElementById('alarm-date').value = today;
    document.getElementById('alarm-time').value = '';
    document.getElementById('alarm-repeat').value = 'none';
    renderAlarmsList();
  });

  // Set default date to today
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('alarm-date').value = today;

  // Dismiss alert
  document.getElementById('dismiss-alert').addEventListener('click', () => {
    document.getElementById('alarm-alert').classList.remove('show');
    currentFiringAlarm = null;
  });

  // ── Panel toggle ─────────────────────────────────────────
  const panel = document.getElementById('alarm-panel');
  const toggleBtn = document.getElementById('toggle-alarms');

  // Show by default on desktop, hidden on mobile
  const mq = window.matchMedia('(min-width: 720px)');
  let panelOpen = mq.matches;
  function updatePanelVisibility() {
    if (mq.matches) {
      panel.style.display = 'flex';
      toggleBtn.classList.add('active');
    } else {
      panel.classList.toggle('open', panelOpen);
      toggleBtn.classList.toggle('active', panelOpen);
    }
  }
  updatePanelVisibility();
  mq.addEventListener('change', updatePanelVisibility);

  toggleBtn.addEventListener('click', () => {
    if (mq.matches) return; // can't toggle on desktop
    panelOpen = !panelOpen;
    updatePanelVisibility();
  });

  // ── Theme toggle ─────────────────────────────────────────
  const themeBtn = document.getElementById('toggle-theme');
  themeBtn.addEventListener('click', () => {
    document.body.classList.toggle('light');
    themeBtn.textContent = document.body.classList.contains('light') ? '🌙 Dark' : '☀️ Light';
  });

  // ── Notification permission ──────────────────────────────
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  // ── Listen for cross-tab alarm updates ──────────────────
  window.addEventListener('storage', e => {
    if (e.key === 'utilityAlarms') renderAlarmsList();
  });

  // ── Service worker message relay ─────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data && e.data.type === 'CHECK_ALARMS') {
        checkAlarms(new Date());
      }
    });
    navigator.serviceWorker.register('/sw.js').then(reg => {
      // Register periodic background sync so alarms can fire without this page open
      if ('periodicSync' in reg) {
        navigator.permissions.query({ name: 'periodic-background-sync' }).then(status => {
          if (status.state === 'granted') {
            reg.periodicSync.register('check-alarms', { minInterval: 15 * 60 * 1000 }).catch(() => {});
          }
        }).catch(() => {});
      }
    }).catch(() => {});
  }

  // Init
  renderAlarmsList();
  syncAlarmsToIDB(getAlarms()); // ensure IDB is in sync with localStorage on startup
  mergeIDBFiredStatus();        // pull back any alarms the SW fired while page was closed

  // ── PWA Install Prompt ───────────────────────────────────────
  (function() {
    var DISMISS_KEY = 'pwaInstallDismissed';
    if (localStorage.getItem(DISMISS_KEY)) return;
    var deferredPrompt = null;
    var btn = document.getElementById('pwa-install-btn');
    if (!btn) return;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      btn.style.display = '';
    });
    btn.addEventListener('click', function() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(r) {
        deferredPrompt = null;
        btn.style.display = 'none';
        if (r.outcome === 'dismissed') localStorage.setItem(DISMISS_KEY, '1');
      });
    });
    window.addEventListener('appinstalled', function() {
      btn.style.display = 'none';
      deferredPrompt = null;
    });
  })();
</script>
</body>
</html>
