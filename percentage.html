<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0b09">
  <link rel="manifest" href="/manifest-percentage.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Percentage Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Instrument+Serif:ital@1&family=Space+Mono:wght@400;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Instrument+Serif:ital@1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0d0b09;
      --s1:    #1e1b15;
      --s2:    #2b2520;
      --s3:    #37302a;
      --b:     #4a4038;
      --a:     #c8a05c;
      --a2:    #5f9ea8;
      --t:     #ede9e2;
      --m:     #a09890;
      --green: #6aab7e;
      --red:   #c46a5a;
      --mono:  'Space Mono', 'Courier New', monospace;
      --serif: 'Instrument Serif', Georgia, serif;
      --sans:  'DM Sans', system-ui, sans-serif;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--t);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: var(--safe-b);
    }

    /* ── Top bar ──────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--b);
      flex-shrink: 0;
      background: rgba(13,11,9,.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .home-btn {
      background: transparent;
      border: 1px solid var(--b);
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 10px;
      font-family: var(--mono);
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--m);
      text-decoration: none;
      transition: border-color .2s, color .2s;
    }
    .home-btn:hover { border-color: var(--a2); color: var(--a2); }

    .page-title {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.05rem;
      color: var(--t);
    }

    /* ── Mode tabs ────────────────────────── */
    .tab-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      margin: 16px 20px 0;
      background: var(--s1);
      border: 1px solid var(--b);
      border-radius: 8px;
      padding: 3px;
      flex-shrink: 0;
    }

    .tab-btn {
      background: transparent;
      border: none;
      border-radius: 6px;
      padding: 9px 6px;
      font-size: 10px;
      font-family: var(--mono);
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--m);
      cursor: pointer;
      transition: background .15s, color .15s;
      line-height: 1.2;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn:hover { color: var(--t); }
    .tab-btn.active {
      background: var(--s2);
      color: var(--a2);
      box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }

    /* ── Panel ────────────────────────────── */
    main {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .panel {
      display: none;
      flex-direction: column;
      gap: 18px;
      width: 100%;
      max-width: 420px;
    }
    .panel.active { display: flex; }

    /* ── Input rows ───────────────────────── */
    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      min-width: 80px;
    }

    .input-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .15em;
      color: var(--m);
      padding-left: 2px;
      font-family: var(--mono);
    }

    .num-input {
      background: var(--s1);
      border: 1px solid var(--b);
      border-radius: 8px;
      color: var(--t);
      font-family: var(--mono);
      font-size: 1.5rem;
      font-weight: 400;
      padding: 12px 14px;
      outline: none;
      width: 100%;
      text-align: right;
      transition: border-color .2s;
      -moz-appearance: textfield;
    }
    .num-input::-webkit-outer-spin-button,
    .num-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .num-input:focus { border-color: var(--a2); }
    .num-input::placeholder { color: rgba(237,233,226,.15); font-size: 1.2rem; }

    .connector {
      font-size: 0.78rem;
      color: var(--m);
      white-space: nowrap;
      flex-shrink: 0;
      padding-top: 18px;
      font-family: var(--mono);
      letter-spacing: .04em;
    }

    .suffix {
      font-size: 1rem;
      color: var(--m);
      padding-top: 18px;
      flex-shrink: 0;
      font-family: var(--mono);
    }

    /* ── Result area ──────────────────────── */
    .result-card {
      background: var(--s1);
      border: 1px solid var(--b);
      border-radius: 12px;
      padding: 22px 20px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-height: 108px;
      justify-content: center;
      transition: border-color .25s;
      position: relative;
      overflow: hidden;
    }

    /* Accent shimmer */
    .result-card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(95,158,168,.4), transparent);
      opacity: 0;
      transition: opacity .25s;
    }
    .result-card.has-result::before { opacity: 1; }
    .result-card.positive::before { background: linear-gradient(90deg, transparent, rgba(106,171,126,.5), transparent); }
    .result-card.negative::before { background: linear-gradient(90deg, transparent, rgba(196,106,90,.5), transparent); }

    .result-card.has-result { border-color: rgba(95,158,168,.25); }
    .result-card.positive   { border-color: rgba(106,171,126,.3); }
    .result-card.negative   { border-color: rgba(196,106,90,.3); }

    .result-equals {
      font-size: 9px;
      color: var(--m);
      text-transform: uppercase;
      letter-spacing: .15em;
      font-family: var(--mono);
    }

    .result-value {
      font-size: 2.6rem;
      font-family: var(--mono);
      font-weight: 400;
      color: var(--t);
      letter-spacing: -.03em;
      text-align: center;
      line-height: 1;
      word-break: break-all;
      transition: color .2s;
    }

    .result-value.positive { color: var(--green); }
    .result-value.negative { color: var(--red); }

    .result-hint {
      font-size: 0.72rem;
      color: var(--m);
      text-align: center;
      line-height: 1.5;
      font-family: var(--sans);
    }

    .result-placeholder {
      color: rgba(154,147,144,.3);
      font-size: 0.8rem;
      text-align: center;
      font-family: var(--mono);
      letter-spacing: .04em;
    }

    /* Clear btn */
    .clear-btn {
      background: none;
      border: 1px solid var(--b);
      border-radius: 4px;
      color: var(--m);
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 7px 16px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
      align-self: center;
      display: none;
    }
    .clear-btn:hover { border-color: var(--a); color: var(--a); }
    .clear-btn.visible { display: block; }

    /* Direction arrow for mode 3 */
    .change-arrow {
      font-size: 1.1rem;
      margin-right: 4px;
    }

    /* ── Tip presets ─────────────────────────────────────── */
    .tip-presets {
      display: flex;
      gap: 6px;
    }
    .tip-preset {
      flex: 1;
      background: var(--s2);
      border: 1px solid var(--b);
      border-radius: 6px;
      color: var(--m);
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      padding: 8px 0;
      cursor: pointer;
      transition: background .15s, border-color .2s, color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tip-preset:hover { border-color: var(--a); color: var(--a); }
    .tip-preset.active { background: rgba(200,160,92,.1); border-color: var(--a); color: var(--a); }

    /* ── Copy result button ─────────────────────────────── */
    .copy-result-btn {
      background: none;
      border: 1px solid rgba(154,147,144,.2);
      border-radius: 4px;
      color: var(--m);
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 5px 12px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .copy-result-btn:hover { border-color: var(--a); color: var(--a); }

    /* Tip result rows */
    .tip-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      width: 100%;
      padding: 3px 0;
    }
    .tip-row-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--m);
      text-transform: uppercase;
      letter-spacing: .1em;
    }
    .tip-row-val {
      font-family: var(--mono);
      font-size: 1.2rem;
      color: var(--t);
    }
    .tip-row.highlight .tip-row-val { color: var(--a); font-size: 1.5rem; }
  </style>
</head>
<body>

<div class="topbar">
  <a class="home-btn" href="index.html">← Home</a>
  <span class="page-title">Percentage</span>
  <button id="pwa-install-btn" class="home-btn" style="display:none;border-color:rgba(200,160,92,.4);color:var(--a);">↓ Install</button>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-panel="0">X% of Y</button>
  <button class="tab-btn" data-panel="1">X of Y as %</button>
  <button class="tab-btn" data-panel="2">% Change</button>
  <button class="tab-btn" data-panel="3">Tip/Split</button>
</div>

<main>

  <!-- Mode 0: What is X% of Y? -->
  <div class="panel active" id="panel-0">
    <div class="input-row">
      <div class="input-group">
        <span class="input-label">Percentage</span>
        <input class="num-input" id="p0-pct" type="number" inputmode="decimal" placeholder="15">
      </div>
      <span class="suffix" style="padding-top:22px;">%</span>
      <span class="connector">of</span>
      <div class="input-group">
        <span class="input-label">Value</span>
        <input class="num-input" id="p0-val" type="number" inputmode="decimal" placeholder="200">
      </div>
    </div>

    <div class="result-card" id="p0-result-card">
      <span class="result-placeholder">Enter values above</span>
    </div>
    <button class="clear-btn" id="p0-clear">Clear</button>
  </div>

  <!-- Mode 1: X is what % of Y? -->
  <div class="panel" id="panel-1">
    <div class="input-row">
      <div class="input-group">
        <span class="input-label">Part</span>
        <input class="num-input" id="p1-part" type="number" inputmode="decimal" placeholder="30">
      </div>
      <span class="connector">is what % of</span>
      <div class="input-group">
        <span class="input-label">Total</span>
        <input class="num-input" id="p1-total" type="number" inputmode="decimal" placeholder="200">
      </div>
    </div>

    <div class="result-card" id="p1-result-card">
      <span class="result-placeholder">Enter values above</span>
    </div>
    <button class="clear-btn" id="p1-clear">Clear</button>
  </div>

  <!-- Mode 2: % change from X to Y -->
  <div class="panel" id="panel-2">
    <div class="input-row">
      <div class="input-group">
        <span class="input-label">From</span>
        <input class="num-input" id="p2-from" type="number" inputmode="decimal" placeholder="50">
      </div>
      <span class="connector">to</span>
      <div class="input-group">
        <span class="input-label">To</span>
        <input class="num-input" id="p2-to" type="number" inputmode="decimal" placeholder="75">
      </div>
    </div>

    <div class="result-card" id="p2-result-card">
      <span class="result-placeholder">Enter values above</span>
    </div>
    <button class="clear-btn" id="p2-clear">Clear</button>
  </div>

  <!-- Mode 3: Tip & Split -->
  <div class="panel" id="panel-3">
    <div class="input-row">
      <div class="input-group">
        <span class="input-label">Bill Total</span>
        <input class="num-input" id="p3-bill" type="number" inputmode="decimal" placeholder="80.00">
      </div>
      <span class="suffix">$</span>
    </div>

    <div>
      <div class="input-row" style="margin-bottom:8px;">
        <div class="input-group">
          <span class="input-label">Tip %</span>
          <input class="num-input" id="p3-tip" type="number" inputmode="decimal" placeholder="20">
        </div>
        <span class="suffix">%</span>
      </div>
      <div class="tip-presets">
        <button class="tip-preset" data-pct="15">15%</button>
        <button class="tip-preset" data-pct="18">18%</button>
        <button class="tip-preset" data-pct="20">20%</button>
        <button class="tip-preset" data-pct="25">25%</button>
      </div>
    </div>

    <div class="input-row">
      <div class="input-group">
        <span class="input-label">Split between</span>
        <input class="num-input" id="p3-people" type="number" inputmode="numeric" placeholder="2" min="1">
      </div>
      <span class="connector">people</span>
    </div>

    <div class="result-card" id="p3-result-card">
      <span class="result-placeholder">Enter values above</span>
    </div>
    <button class="clear-btn" id="p3-clear">Clear</button>
  </div>

</main>

<script>
  // ── Popup mode: hide topbar ───────────────────────────────────
  if (new URLSearchParams(location.search).get('popup') === '1') {
    const topbar = document.querySelector('.topbar');
    if (topbar) topbar.style.display = 'none';
  }

  // ── Tab switching ─────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = btn.dataset.panel;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + idx).classList.add('active');
    });
  });

  // ── Helpers ───────────────────────────────────────────────
  function fmt(n, decimals = 2) {
    if (!isFinite(n) || isNaN(n)) return null;
    // Remove trailing zeros up to `decimals` places
    return parseFloat(n.toFixed(decimals)).toLocaleString('en-US', {
      minimumFractionDigits: 0,
      maximumFractionDigits: decimals
    });
  }

  function setResult(cardId, {value, label, hint, colorClass}) {
    const card = document.getElementById(cardId);
    card.innerHTML = '';
    card.className = 'result-card';

    if (value === null) {
      card.innerHTML = '<span class="result-placeholder">Enter values above</span>';
      return;
    }

    card.classList.add('has-result');
    if (colorClass) card.classList.add(colorClass);

    if (label) {
      const eq = document.createElement('span');
      eq.className = 'result-equals';
      eq.textContent = label;
      card.appendChild(eq);
    }

    const val = document.createElement('div');
    val.className = 'result-value' + (colorClass ? ` ${colorClass}` : '');
    val.textContent = value;
    card.appendChild(val);

    if (hint) {
      const h = document.createElement('div');
      h.className = 'result-hint';
      h.textContent = hint;
      card.appendChild(h);
    }

    // Copy button
    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-result-btn';
    copyBtn.textContent = '⎘ Copy';
    copyBtn.style.marginTop = '8px';
    const copyText = label ? `${label} ${value}` : value;
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(copyText).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = '⎘ Copy', 1500);
      });
    });
    card.appendChild(copyBtn);
  }

  function showClear(btnId, show) {
    document.getElementById(btnId).classList.toggle('visible', show);
  }

  // ── Mode 0: What is X% of Y? ─────────────────────────────
  function computeMode0() {
    const pct = parseFloat(document.getElementById('p0-pct').value);
    const val = parseFloat(document.getElementById('p0-val').value);
    const hasInput = !isNaN(pct) || !isNaN(val);

    if (isNaN(pct) || isNaN(val)) {
      setResult('p0-result-card', { value: null });
      showClear('p0-clear', hasInput);
      return;
    }

    const result = (pct / 100) * val;
    const fmtResult = fmt(result);

    // Contextual hints
    let hint = '';
    if (pct === 15)  hint = `15% tip on a $${fmt(val)} bill → $${fmtResult}`;
    else if (pct === 20) hint = `20% tip on a $${fmt(val)} bill → $${fmtResult}`;
    else if (pct === 10) hint = `10% of ${fmt(val)} = ${fmtResult}`;

    setResult('p0-result-card', {
      value: fmtResult,
      label: `${fmt(pct)}% of ${fmt(val)} =`,
      hint
    });
    showClear('p0-clear', true);
  }

  ['p0-pct', 'p0-val'].forEach(id => {
    document.getElementById(id).addEventListener('input', computeMode0);
  });

  document.getElementById('p0-clear').addEventListener('click', () => {
    document.getElementById('p0-pct').value = '';
    document.getElementById('p0-val').value = '';
    computeMode0();
  });

  // ── Mode 1: X is what % of Y? ────────────────────────────
  function computeMode1() {
    const part  = parseFloat(document.getElementById('p1-part').value);
    const total = parseFloat(document.getElementById('p1-total').value);
    const hasInput = !isNaN(part) || !isNaN(total);

    if (isNaN(part) || isNaN(total) || total === 0) {
      setResult('p1-result-card', { value: null });
      showClear('p1-clear', hasInput);
      return;
    }

    const result = (part / total) * 100;
    const fmtResult = fmt(result) + '%';

    let hint = '';
    if (total > 0) hint = `${fmt(part)} out of ${fmt(total)} = ${fmt(result)}%`;

    setResult('p1-result-card', {
      value: fmtResult,
      label: `${fmt(part)} of ${fmt(total)} =`,
      hint
    });
    showClear('p1-clear', true);
  }

  ['p1-part', 'p1-total'].forEach(id => {
    document.getElementById(id).addEventListener('input', computeMode1);
  });

  document.getElementById('p1-clear').addEventListener('click', () => {
    document.getElementById('p1-part').value = '';
    document.getElementById('p1-total').value = '';
    computeMode1();
  });

  // ── Mode 2: % change from X to Y ─────────────────────────
  function computeMode2() {
    const from = parseFloat(document.getElementById('p2-from').value);
    const to   = parseFloat(document.getElementById('p2-to').value);
    const hasInput = !isNaN(from) || !isNaN(to);

    if (isNaN(from) || isNaN(to) || from === 0) {
      setResult('p2-result-card', { value: null });
      showClear('p2-clear', hasInput);
      return;
    }

    const change = ((to - from) / Math.abs(from)) * 100;
    const isIncrease = change >= 0;
    const sign = isIncrease ? '+' : '';
    const arrow = isIncrease ? '▲' : '▼';
    const colorClass = isIncrease ? 'positive' : 'negative';
    const word = isIncrease ? 'increase' : 'decrease';

    setResult('p2-result-card', {
      value: `${arrow} ${sign}${fmt(change)}%`,
      label: `From ${fmt(from)} to ${fmt(to)} =`,
      hint: `${Math.abs(fmt(change))}% ${word} (difference: ${fmt(Math.abs(to - from))})`,
      colorClass
    });
    showClear('p2-clear', true);
  }

  ['p2-from', 'p2-to'].forEach(id => {
    document.getElementById(id).addEventListener('input', computeMode2);
  });

  document.getElementById('p2-clear').addEventListener('click', () => {
    document.getElementById('p2-from').value = '';
    document.getElementById('p2-to').value = '';
    computeMode2();
  });

  // ── Mode 3: Tip & Split ───────────────────────────────────
  function computeMode3() {
    const bill   = parseFloat(document.getElementById('p3-bill').value);
    const tipPct = parseFloat(document.getElementById('p3-tip').value);
    const people = Math.max(1, parseInt(document.getElementById('p3-people').value) || 1);
    const hasInput = !isNaN(bill) || !isNaN(tipPct);

    const card = document.getElementById('p3-result-card');
    showClear('p3-clear', hasInput);

    if (isNaN(bill) || isNaN(tipPct)) {
      card.innerHTML = '<span class="result-placeholder">Enter values above</span>';
      card.className = 'result-card';
      return;
    }

    const tipAmt    = bill * (tipPct / 100);
    const total     = bill + tipAmt;
    const perPerson = total / people;

    card.className = 'result-card has-result';
    card.innerHTML = '';

    const rows = [
      { label: 'Tip Amount', value: `$${fmt(tipAmt)}`, highlight: false },
      { label: 'Total',      value: `$${fmt(total)}`,  highlight: false },
      ...(people > 1 ? [{ label: `Each (${people}×)`, value: `$${fmt(perPerson)}`, highlight: true }] : []),
    ];

    rows.forEach(row => {
      const div = document.createElement('div');
      div.className = 'tip-row' + (row.highlight ? ' highlight' : '');
      div.innerHTML = `<span class="tip-row-label">${row.label}</span><span class="tip-row-val">${row.value}</span>`;
      card.appendChild(div);
    });

    // Copy button
    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-result-btn';
    copyBtn.textContent = '⎘ Copy';
    copyBtn.style.marginTop = '10px';
    copyBtn.addEventListener('click', () => {
      const text = rows.map(r => `${r.label}: ${r.value}`).join('\n');
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = '⎘ Copy', 1500);
      });
    });
    card.appendChild(copyBtn);
  }

  // Tip preset buttons
  document.querySelectorAll('.tip-preset').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tip-preset').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('p3-tip').value = btn.dataset.pct;
      computeMode3();
    });
  });

  ['p3-bill', 'p3-tip', 'p3-people'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      document.querySelectorAll('.tip-preset').forEach(b => b.classList.remove('active'));
      computeMode3();
    });
  });

  document.getElementById('p3-clear').addEventListener('click', () => {
    ['p3-bill','p3-tip','p3-people'].forEach(id => document.getElementById(id).value = '');
    document.querySelectorAll('.tip-preset').forEach(b => b.classList.remove('active'));
    computeMode3();
  });
</script>
<script>
  // ── PWA Install Prompt ────────────────────────────────────────
  (function() {
    var DISMISS_KEY = 'pwaInstallDismissed';
    if (localStorage.getItem(DISMISS_KEY)) return;
    var deferredPrompt = null;
    var btn = document.getElementById('pwa-install-btn');
    if (!btn) return;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      btn.style.display = '';
    });
    btn.addEventListener('click', function() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(r) {
        deferredPrompt = null;
        btn.style.display = 'none';
        if (r.outcome === 'dismissed') localStorage.setItem(DISMISS_KEY, '1');
      });
    });
    window.addEventListener('appinstalled', function() {
      btn.style.display = 'none';
      deferredPrompt = null;
    });
  })();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function(){});
</script>
</body>
</html>
